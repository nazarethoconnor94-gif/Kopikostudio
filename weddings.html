<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEDDINGS | KŌPIKO STUDIO</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --bg-color: #2A2727; 
            --accent-gold: #d4af37; 
        }

        body { 
            background-color: var(--bg-color); 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden; 
        }

        /* --- 2. STICKY NAVIGATION --- */
        .top-nav-container {
            position: -webkit-sticky; 
            position: sticky; 
            top: 0; 
            z-index: 2000; 
            background: rgba(42, 39, 39, 0.65);
            backdrop-filter: blur(55px); 
            -webkit-backdrop-filter: blur(55px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .top-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 0; 
            max-width: 1300px; 
            margin: 0 auto; 
            width: 90%;
        }
        .logo { 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            letter-spacing: 7px; 
            font-weight: 500; 
            text-decoration: none; 
            color: #fff;
        }
        
        .nav-group { display: flex; gap: 30px; }
        .nav-group a { 
            color: #fff; 
            text-decoration: none; 
            font-size: 0.7rem; 
            text-transform: lowercase; 
            letter-spacing: 2px; 
            opacity: 0.6; 
            transition: 0.3s;
        }
        .nav-group a:hover { opacity: 1; color: var(--accent-gold); }
        .nav-group a.active { opacity: 1; color: var(--accent-gold); }

        /* --- 3. CONTENT LAYOUT --- */
        .container { max-width: 1300px; margin: 40px auto 100px; width: 90%; }

        /* Hero Image Section */
        .hero-wrapper { width: 100%; margin-bottom: 30px; }
        .wedding-hero { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            object-fit: cover; 
            display: block;
            filter: drop-shadow(0 30px 50px rgba(0,0,0,0.5));
        }

        /* Masonry Grid Setup from your Sketch */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .gallery-item {
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
            transition: transform 0.5s ease;
        }
        .gallery-item:hover { transform: scale(1.01); }

        /* Ratio Classes */
        .p9-16 { 
            aspect-ratio: 9 / 16; 
            grid-row: span 2; 
        }

        .l16-9 { 
            aspect-ratio: 16 / 9; 
            grid-row: span 1; 
        }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .nav-group { display: none; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .p9-16, .l16-9 { grid-row: auto; aspect-ratio: auto; height: 450px; }
        }
    </style>
</head>
<body>

    <div class="top-nav-container">
        <nav class="top-nav">
            <a href="/" class="logo">KŌPIKO STUDIO</a>
            <div class="nav-group">
                <a href="/">home</a>
                <a href="/weddings" class="active">weddings</a>
                <a href="/commercial">commercial</a>
                <a href="/about">about us</a>
            </div>
        </nav>
    </div>

    <div class="container">
        <div class="hero-wrapper">
            <img src="weddinghero.jpg" alt="Wedding Hero" class="wedding-hero">
        </div>

        <div class="gallery-grid">
            <img src="w1.jpg" class="gallery-item p9-16">
            <img src="w5.jpg" class="gallery-item l16-9">

            <img src="w2.jpg" class="gallery-item l16-9">
            <img src="w4.jpg" class="gallery-item p9-16">

            <img src="w3.jpg" class="gallery-item p9-16">
            <img src="w6.jpg" class="gallery-item l16-9">
        </div>
    </div>

</body>
</html>
