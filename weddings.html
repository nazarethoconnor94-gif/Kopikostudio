<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEDDINGS | KŌPIKO STUDIO</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --bg-color: #2A2727; 
            --accent-gold: #d4af37; 
        }

        body { 
            background-color: var(--bg-color); 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
        }

        /* --- 2. STICKY NAVIGATION --- */
        .top-nav-container {
            position: sticky; top: 0; z-index: 2000; 
            background: rgba(42, 39, 39, 0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 0; max-width: 1300px; margin: 0 auto; width: 90%;
        }
        .logo { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 7px; text-decoration: none; color: #fff; font-weight: 500; }
        .nav-group { display: flex; gap: 30px; }
        .nav-group a { color: #fff; text-decoration: none; font-size: 0.7rem; text-transform: lowercase; letter-spacing: 2px; opacity: 0.6; transition: 0.3s; }
        .nav-group a:hover, .nav-group a.active { opacity: 1; color: var(--accent-gold); }

        /* --- 3. FULL IMAGE HERO (NO CROP) --- */
        .container { max-width: 1300px; margin: 0 auto 100px; width: 90%; }

        .hero-section {
            position: relative;
            width: 100%;
            margin-top: 40px;
            margin-bottom: 40px;
            line-height: 0; /* Removes tiny gap under image */
        }

        /* The actual photo - No more background-size: cover */
        .hero-main-img {
            width: 100%;
            height: auto; /* Keeps original proportions */
            display: block;
            filter: blur(6px) brightness(0.7); /* Your requested blur */
        }

        /* Centered Bird & Text Overlay */
        .hero-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .bird-v2 { 
            width: 160px; 
            animation: floating 6s infinite ease-in-out; 
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8));
        }

        .hero-overlay h1 { 
            margin-top: 15px;
            font-size: 1.8rem; 
            letter-spacing: 15px; 
            font-weight: 700; 
            text-transform: uppercase;
            text-shadow: 0 4px 20px rgba(0,0,0,0.9);
            line-height: 1.2;
        }

        /* --- 4. THE MASONRY GRID --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .gallery-item {
            width: 100%; height: 100%; object-fit: cover; display: block;
            filter: brightness(0.9); transition: 0.5s ease;
        }
        .gallery-item:hover { transform: scale(1.02); filter: brightness(1); }

        /* Ratios matching your sketch */
        .p9-16 { aspect-ratio: 9 / 16; grid-row: span 2; }
        .l16-9 { aspect-ratio: 16 / 9; grid-row: span 1; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        @media (max-width: 900px) {
            .nav-group { display: none; }
            .bird-v2 { width: 100px; }
            .hero-overlay h1 { font-size: 1.2rem; letter-spacing: 8px; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .p9-16, .l16-9 { grid-row: auto; aspect-ratio: auto; height: 350px; }
        }
    </style>
</head>
<body>

    <div class="top-nav-container">
        <nav class="top-nav">
            <a href="/" class="logo">KŌPIKO STUDIO</a>
            <div class="nav-group">
                <a href="/">home</a>
                <a href="/weddings" class="active">weddings</a>
                <a href="/commercial">commercial</a>
                <a href="/about">about us</a>
            </div>
        </nav>
    </div>

    <div class="container">
        <div class="hero-section">
            <img src="weddinghero.jpg" class="hero-main-img" alt="Wedding Showcase">
            
            <div class="hero-overlay">
                <img src="b11.webp" alt="Gold Bird" class="bird-v2">
                <h1>WEDDINGS</h1>
            </div>
        </div>

        <div class="gallery-grid">
            <img src="w1.jpg" class="gallery-item p9-16">
            <img src="w2.jpg" class="gallery-item l16-9">
            <img src="w3.jpg" class="gallery-item p9-16">
            <img src="w4.jpg" class="gallery-item p9-16">
            <img src="w5.jpg" class="gallery-item l16-9">
            <img src="w6.jpg" class="gallery-item l16-9">
        </div>
    </div>

</body>
</html>
