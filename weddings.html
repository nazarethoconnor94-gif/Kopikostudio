<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEDDINGS | KŌPIKO COLLECTIONS</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --bg-color: #2A2727; 
            --accent-gold: #d4af37; 
        }

        body { background-color: var(--bg-color); color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; }

        /* --- 2. STICKY NAVIGATION --- */
        .top-nav-container {
            position: sticky; top: 0; z-index: 2000; 
            background: rgba(42, 39, 39, 0.65);
            backdrop-filter: blur(55px); -webkit-backdrop-filter: blur(55px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 0; max-width: 1300px; margin: 0 auto; width: 90%;
        }
        .logo { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 7px; text-decoration: none; color: #fff; }

        /* --- 3. THE MASONRY GRID --- */
        .container { max-width: 1300px; margin: 40px auto 100px; width: 90%; }

        .wedding-hero { 
            width: 100%; aspect-ratio: 16 / 9; object-fit: cover; 
            margin-bottom: 25px; display: block; 
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 Columns like the sketch */
            gap: 20px;
        }

        .gallery-item {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: opacity 0.3s ease;
        }
        .gallery-item:hover { opacity: 0.8; }

        /* MAPPING THE RATIOS */
        .p9-16 { 
            aspect-ratio: 9 / 16; 
            grid-row: span 2; /* Spans 2 rows to match the height of 2 landscape boxes */
        }

        .l16-9 { 
            aspect-ratio: 16 / 9; 
            grid-row: span 1; 
        }

        /* Responsive */
        @media (max-width: 800px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            /* Reset spans for mobile so it doesn't break the flow */
            .p9-16, .l16-9 { grid-row: auto; aspect-ratio: auto; height: 400px; }
        }
    </style>
</head>
<body>

    <div class="top-nav-container">
        <nav class="top-nav">
            <a href="/" class="logo">KŌPIKO</a>
        </nav>
    </div>

    <div class="container">
        <img src="wedding-hero.jpg" alt="Hero" class="wedding-hero">

        <div class="gallery-grid">
            <img src="w1.jpg" class="gallery-item p9-16"> <img src="w2.jpg" class="gallery-item l16-9"> <img src="w3.jpg" class="gallery-item p9-16"> <img src="w4.jpg" class="gallery-item p9-16"> <img src="w5.jpg" class="gallery-item l16-9"> <img src="w6.jpg" class="gallery-item l16-9"> </div>
    </div>

</body>
</html>
