<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO COLLECTIONS | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
        }

        body.modal-open { overflow: hidden; }

        /* --- 2. SPLASH PAGE --- */
        #brand-modal { 
            position: fixed; inset: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; text-align: center; 
            transition: opacity 0.8s ease, visibility 0.8s; 
        }
        .modal-content { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 20px; }
        .title-block { position: relative; display: inline-block; margin-bottom: 50px; }
        .modal-title { 
            font-size: clamp(2.5rem, 8vw, 5rem); 
            letter-spacing: 20px; 
            font-weight: 200; 
            text-transform: uppercase;
            margin-right: -20px; 
        }
        .studio-subtitle {
            position: absolute; left: 18%; right: 18%; top: 100%; margin-top: 10px;
            display: flex; justify-content: space-between;
            font-size: clamp(0.5rem, 2vw, 0.85rem); font-weight: 300; text-transform: uppercase; color: #888;
        }
        .gold-bird { width: 140px; margin-bottom: 40px; animation: floating 5s infinite ease-in-out; }
        .cta-enter { 
            background: transparent; color: #fff; border: 1px solid #fff; 
            padding: 15px 40px; letter-spacing: 5px; text-transform: uppercase; 
            font-size: 0.7rem; cursor: pointer; transition: 0.3s; 
        }
        .cta-enter:hover { background: #fff; color: #000; }

        /* --- 3. LAYOUT --- */
        .main-layout { display: grid; grid-template-columns: 80px 1fr 80px; }
        .center-col { grid-column: 2; max-width: 1200px; margin: 0 auto; width: 100%; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 40px 0; }
        .logo { font-size: 1rem; text-transform: uppercase; letter-spacing: 6px; }

        /* --- 4. HERO SECTION --- */
        .hero-container { position: relative; width: 100%; margin-bottom: 80px; display: flex; align-items: center; }
        .hero-img-main { 
            width: 100%; height: auto; display: block; 
            border: 50px solid transparent; 
            border-image-source: url('border.png'); 
            border-image-slice: 500 fill; 
            border-image-repeat: round;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 30px 80px rgba(0,0,0,0.7);
        }
        .hero-branding {
            position: absolute; z-index: 10; right: 8%; text-align: center; pointer-events: none;
        }
        .bird-v2 { width: 240px; animation: floating 6s infinite ease-in-out; filter: drop-shadow(0 15px 30px #000); }

        /* --- 5. BOTTOM GRID --- */
        .bottom-grid { display: flex; gap: 40px; padding-bottom: 100px; }
        .grid-card { flex: 1; text-align: center; text-decoration: none; color: inherit; }
        .card-img-container { width: 100%; margin-bottom: 20px; }
        .card-img-container img { width: 100%; height: auto; display: block; transition: 0.6s; }
        .grid-card p { font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase; opacity: 0.5; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- 6. MOBILE FIXES --- */
        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 20px 1fr 20px; }
            .top-nav { padding: 30px 0; }
            
            .hero-container { flex-direction: column; margin-bottom: 40px; }
            .hero-img-main { border-width: 15px; } /* Thinner border for small screens */
            
            .hero-branding { 
                position: relative; right: auto; transform: none; 
                margin-top: 40px; width: 100%; padding: 0 20px;
            }
            .bird-v2 { width: 180px; }
            
            .bottom-grid { flex-direction: column; gap: 50px; }
            .grid-card p { font-size: 0.7rem; opacity: 0.8; }
        }
    </style>
</head>
<body class="modal-open">

    <div id="brand-modal">
        <div class="modal-content">
            <div class="title-block">
                <h1 class="modal-title">KŌPIKO</h1>
                <div class="studio-subtitle">
                    <span>S</span><span>T</span><span>U</span><span>D</span><span>I</span><span>O</span>
                </div>
            </div>
            <img src="b11.webp" alt="Bird" class="gold-bird">
            <button class="cta-enter" onclick="closeModal()">Enter Studio</button>
        </div>
    </div>

    <div class="main-layout">
        <aside></aside>
        <main class="center-col">
            <nav class="top-nav">
                <div class="logo">KŌPIKO</div>
            </nav>

            <section class="hero-container">
                <img src="hme.jpg" alt="Hero Art" class="hero-img-main">
                <div class="hero-branding">
                    <img src="b11.webp" alt="Bird" class="bird-v2">
                    <div style="margin-top: 20px;">
                        <p style="letter-spacing: 8px; font-weight: 700; font-size: 0.9rem;">CREATIVE IDENTITY</p>
                        <div style="width: 1px; height: 40px; background: #fff; margin: 15px auto;"></div>
                        <p style="letter-spacing: 8px; font-weight: 100; font-size: 0.9rem;">FOR THE BOLD</p>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <a href="/weddings" class="grid-card">
                    <div class="card-img-container"><img src="weddings.jpg"></div>
                    <p>weddings</p>
                </a>
                <a href="/commercial" class="grid-card">
                    <div class="card-img-container"><img src="commercial.jpg"></div>
                    <p>commercial</p>
                </a>
                <a href="/about" class="grid-card">
                    <div class="card-img-container"><img src="aboutus.jpg"></div>
                    <p>about us</p>
                </a>
            </section>
        </main>
        <aside></aside>
    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            modal.style.opacity = '0';
            setTimeout(() => { 
                modal.style.visibility = 'hidden'; 
                document.body.classList.remove('modal-open');
            }, 800);
        }
    </script>
</body>
</html>
