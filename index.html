<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO COLLECTIONS | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #000000; --accent-gold: #d4af37; }

        body, html { 
            background-color: var(--bg-color); 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
        }

        /* Prevent background scroll when splash is active */
        body.modal-open { overflow: hidden; }

        /* --- 2. SPLASH SCREEN (ENTRANCE) --- */
        #brand-modal { 
            position: fixed; inset: 0; background: var(--bg-color); 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; text-align: center; 
            transition: opacity 0.8s ease, visibility 0.8s; 
        }
        .modal-content { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 20px; }
        .modal-title { 
            font-size: clamp(2.5rem, 8vw, 5.5rem); letter-spacing: 20px; 
            font-weight: 200; text-transform: uppercase; margin-bottom: 40px;
        }
        .gold-bird-splash { width: 140px; margin-bottom: 40px; animation: floating 5s infinite ease-in-out; }
        .cta-enter { 
            background: transparent; color: #fff; border: 1px solid #fff; 
            padding: 15px 40px; letter-spacing: 5px; text-transform: uppercase; 
            font-size: 0.7rem; cursor: pointer; transition: 0.3s; 
        }
        .cta-enter:hover { background: #fff; color: #000; }

        /* --- 3. STICKY NAVIGATION (GLASSMORPHISM) --- */
        .top-nav-container {
            position: sticky; 
            top: 0; 
            z-index: 2000; /* Higher than everything else */
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 20px 0;
        }
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            max-width: 1300px; margin: 0 auto; width: 90%;
        }
        .logo { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 7px; font-weight: 500; }
        .nav-group { display: flex; gap: 30px; }
        .nav-group a { 
            color: #fff; text-decoration: none; font-size: 0.7rem; 
            text-transform: lowercase; letter-spacing: 2px; opacity: 0.6; 
            transition: 0.3s;
        }
        .nav-group a:hover { opacity: 1; color: var(--accent-gold); }

        /* --- 4. HERO SECTION (SOFT DOUBLE-STACK) --- */
        .main-layout { display: grid; grid-template-columns: 1fr; background: var(--bg-color); }
        .center-col { max-width: 1300px; margin: 0 auto; width: 90%; }

        .hero-container { 
            position: relative; width: 100%; margin-top: 40px; margin-bottom: 80px; 
            display: flex; align-items: center; justify-content: center;
        }

        .hero-img-main { 
            width: 100%; height: auto; display: block; 
            background-color: #000;
            border: 55px solid transparent; 
            border-image-source: url('border.png'); 
            border-image-slice: 500 fill; 
            border-image-repeat: round;

            /* SOFT BLURRED DOUBLE STACK */
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.9)) 
                    drop-shadow(0 0 15px rgba(212, 175, 55, 0.1)); 
            box-shadow: inset 0 0 100px rgba(0,0,0,1);
        }

        /* SOFT BLURRED BRANDING */
        .hero-branding { 
            position: absolute; z-index: 10; right: 8%; text-align: center; pointer-events: none; 
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.9));
        }
        
        .bird-v2 { width: 220px; animation: floating 6s infinite ease-in-out; }
        
        .hero-branding p { 
            letter-spacing: 12px; font-weight: 700; 
            text-shadow: 0 0 20px rgba(0,0,0,1); 
            text-transform: uppercase;
        }

        /* --- 5. BOTTOM GRID --- */
        .bottom-grid { display: flex; gap: 40px; padding-bottom: 100px; }
        .grid-card { flex: 1; text-align: center; text-decoration: none; color: inherit; }
        .card-img-container { 
            width: 100%; margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,1);
        }
        .card-img-container img { width: 100%; height: auto; display: block; transition: 0.5s ease; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        @media (max-width: 900px) {
            .nav-group { display: none; }
            .hero-container { flex-direction: column; }
            .hero-img-main { border-width: 20px; }
            .hero-branding { position: relative; right: auto; margin-top: 40px; width: 100%; }
            .bottom-grid { flex-direction: column; }
        }
    </style>
</head>
<body class="modal-open">

    <div id="brand-modal">
        <div class="modal-content">
            <h1 class="modal-title">KŌPIKO</h1>
            <img src="b11.webp" alt="Bird" class="gold-bird-splash">
            <button class="cta-enter" onclick="closeModal()">Enter Studio</button>
        </div>
    </div>

    <div class="top-nav-container">
        <nav class="top-nav">
            <div class="logo">KŌPIKO</div>
            <div class="nav-group">
                <a href="/">home</a>
                <a href="/weddings">weddings</a>
                <a href="/commercial">commercial</a>
                <a href="/about">about us</a>
            </div>
        </nav>
    </div>

    <div class="main-layout">
        <main class="center-col">
            <section class="hero-container">
                <img src="hme.jpg" alt="Hero Art" class="hero-img-main">
                <div class="hero-branding">
                    <img src="b11.webp" alt="Bird" class="bird-v2">
                    <div style="margin-top: 25px;">
                        <p>CREATIVE IDENTITY</p>
                        <div style="width: 1px; height: 60px; background: #fff; margin: 20px auto;"></div>
                        <p style="font-weight: 100; letter-spacing: 15px;">FOR THE BOLD</p>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <a href="/weddings" class="grid-card">
                    <div class="card-img-container"><img src="weddings.jpg"></div>
                    <p>weddings</p>
                </a>
                <a href="/commercial" class="grid-card">
                    <div class="card-img-container"><img src="commercial.jpg"></div>
                    <p>commercial</p>
                </a>
                <a href="/about" class="grid-card">
                    <div class="card-img-container"><img src="aboutus.jpg"></div>
                    <p>about us</p>
                </a>
            </section>
        </main>
    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            modal.style.opacity = '0';
            setTimeout(() => { 
                modal.style.visibility = 'hidden'; 
                document.body.classList.remove('modal-open');
            }, 800);
        }
    </script>
</body>
</html>
