<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO COLLECTIONS | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
            height: 100%;
            overflow-y: hidden; 
        }

        .main-layout { display: grid; grid-template-columns: 80px 1fr 80px; min-height: 100vh; }
        .center-col { grid-column: 2; padding: 0 40px; display: flex; flex-direction: column; }

        /* --- 2. SPLASH PAGE --- */
        #brand-modal { 
            position: fixed; inset: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; text-align: center; 
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s; 
        }
        .modal-content { max-width: 600px; padding: 20px; display: flex; flex-direction: column; align-items: center;}
        .modal-title { font-size: 3.5rem; letter-spacing: 18px; font-weight: 200; margin-bottom: 20px; text-transform: uppercase; }
        .gold-bird { width: 220px; margin-bottom: 30px; animation: floating 5s infinite ease-in-out; }
        .modal-definition { font-size: 0.9rem; letter-spacing: 2px; color: #888; margin-bottom: 40px; font-style: italic; }
        .cta-enter { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 40px; letter-spacing: 5px; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; transition: 0.3s; }
        .cta-enter:hover { background: #fff; color: #000; }

        /* --- 3. NAV --- */
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; width: 100%; padding: 12px 30px; 
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(45px); 
            -webkit-backdrop-filter: blur(45px); z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .menu-icon { display: none; flex-direction: column; justify-content: space-between; width: 24px; height: 16px; cursor: pointer; z-index: 1100; }
        .menu-icon span { width: 100%; height: 2px; background: #fff; transition: 0.3s; }
        .menu-icon.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .menu-icon.open span:nth-child(2) { opacity: 0; }
        .menu-icon.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        .mobile-drawer { position: fixed; top: -100%; left: 0; width: 100%; background: #0a0a0a; padding: 100px 40px 60px; display: flex; flex-direction: column; gap: 30px; transition: 0.4s ease-in-out; z-index: 900; }
        .mobile-drawer.active { top: 0; }
        .mobile-drawer a { color: #fff; text-decoration: none; font-size: 1.4rem; letter-spacing: 4px; text-transform: lowercase; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 800; }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        .nav-group { display: flex; gap: 30px; }
        .nav-group a { color: #fff; text-decoration: none; font-size: 0.65rem; text-transform: lowercase; letter-spacing: 2px; opacity: 0.8; }
        .logo { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 6px; font-weight: 500; }

        /* --- 4. HERO CONTAINER: ADJUSTED FOR 825x663 PNG --- */
        .hero-container { 
            width: 100%; height: auto; position: relative; line-height: 0;
            margin-top: 25px; 
        }

        .hero-img-main { 
            width: 100%; height: auto; display: block; 
            
            /* --- THE PNG BORDER SETTINGS --- */
            border-style: solid; 
            border-width: 40px; /* How thick the frame looks on screen */
            border-image-source: url('border.png'); 
            
            /* Adjusted slice for your 825px image size */
            border-image-slice: 80; 
            
            border-image-repeat: stretch; 
            
            /* Museum lighting and depth */
            box-shadow: 
                0 0 0 4px #000, 
                inset 0 0 40px rgba(0,0,0,0.85), 
                0 30px 100px rgba(0,0,0,1);
        }

        .hero-branding-overlay {
            position: absolute; top: 0; right: 0; width: 50%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2; padding-right: 40px;
        }
        .bird-v2 { width: 380px; height: auto; animation: floating 6s infinite ease-in-out; margin-bottom: 35px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8)); }

        /* --- 5. BRANDING --- */
        .tagline-stack { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .tag-text { font-size: 1.25rem; text-transform: uppercase; letter-spacing: 9px; color: #fff; text-shadow: 2px 2px 5px #000, 0 0 25px rgba(0,0,0,0.9); }
        .tag-heavy { font-weight: 700; } .tag-thin { font-weight: 100; }  
        .tag-vertical-line { width: 1.5px; height: 60px; background-color: #fff; box-shadow: 2px 2px 5px #000; }

        /* --- 6. BOTTOM GRID --- */
        .bottom-grid { display: flex; gap: 25px; margin-top: 40px; padding-bottom: 150px; align-items: flex-start;}
        .grid-card { flex: 1; text-align: center; text-decoration: none; color: inherit; }
        .card-img-placeholder { width: 100%; margin-bottom: 12px; background: #111; overflow: hidden; }
        .card-img-placeholder img { width: 100%; height: auto; display: block; transition: 0.5s; }
        .grid-card:hover img { transform: scale(1.05); }
        .grid-card p { font-size: 0.65rem; letter-spacing: 2px; text-transform: lowercase; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- MOBILE --- */
        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 0 1fr 0; }
            .center-col { padding: 0; }
            .nav-group { display: none; }
            .menu-icon { display: flex; }
            .hero-container { display: flex; flex-direction: column; width: 100vw; margin-top: 10px; }
            .hero-img-main { 
                width: 100vw; 
                border-width: 18px; 
                border-image-slice: 80; 
                box-shadow: 0 0 0 2px #000, inset 0 0 20px rgba(0,0,0,0.8), 0 15px 40px rgba(0,0,0,1);
            }
            .hero-branding-overlay { position: relative; width: 100%; background: #000; padding: 60px 20px; justify-content: center; }
            .bird-v2 { width: 220px; }
            .tag-text { font-size: 1rem; letter-spacing: 5px; }
            .bottom-grid { padding: 0 20px; flex-direction: column; gap: 40px; }
        }
    </style>
</head>
<body>

    <div id="brand-modal">
        <div class="modal-content">
            <h1 class="modal-title">KŌPIKO</h1>
            <img src="b11.webp" alt="Bird" class="gold-bird">
            <p class="modal-definition">To meander; to follow a winding path.</p>
            <button class="cta-enter" onclick="closeModal()">Enter Studio</button>
        </div>
    </div>

    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

    <div class="mobile-drawer" id="mobileDrawer">
        <a href="/" onclick="toggleMenu()">home</a>
        <a href="/weddings" onclick="toggleMenu()">weddings</a>
        <a href="/commercial" onclick="toggleMenu()">commercial</a>
        <a href="/about" onclick="toggleMenu()">about us</a>
    </div>

    <div class="main-layout">
        <aside></aside>
        <main class="center-col">
            <nav class="top-nav">
                <div class="menu-icon" id="menuBtn" onclick="toggleMenu()">
                    <span></span><span></span><span></span>
                </div>
                <div class="nav-group"><a href="/">home</a><a href="/weddings">weddings</a><a href="/commercial">commercial</a><a href="/about">about us</a></div>
                <div class="logo">KŌPIKO</div>
            </nav>

            <section class="hero-container">
                <img src="hme.jpg" alt="Hero" class="hero-img-main">
                <div class="hero-branding-overlay">
                    <img src="b11.webp" alt="Bird" class="bird-v2">
                    <div class="tagline-stack">
                        <span class="tag-text tag-heavy">CREATIVE IDENTITY</span>
                        <div class="tag-vertical-line"></div>
                        <span class="tag-text tag-thin">FOR THE BOLD</span>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <a href="/weddings" class="grid-card">
                    <div class="card-img-placeholder"><img src="weddings.jpg" alt="Weddings"></div>
                    <p>weddings</p>
                </a>
                <a href="/commercial" class="grid-card">
                    <div class="card-img-placeholder"><img src="commercial.jpg" alt="Commercial"></div>
                    <p>commercial</p>
                </a>
                <a href="/about" class="grid-card">
                    <div class="card-img-placeholder"><img src="aboutus.jpg" alt="About Us"></div>
                    <p>about us</p>
                </a>
            </section>
        </main>
        <aside></aside>
    </div>

    <script>
        function closeModal() {
            document.getElementById('brand-modal').style.opacity = '0';
            document.getElementById('brand-modal').style.visibility = 'hidden';
            document.body.style.overflowY = 'auto';
            document.documentElement.style.overflowY = 'auto';
        }

        function toggleMenu() {
            const drawer = document.getElementById('mobileDrawer');
            const overlay = document.getElementById('menuOverlay');
            const btn = document.getElementById('menuBtn');
            drawer.classList.toggle('active');
            overlay.classList.toggle('active');
            btn.classList.toggle('open');
            document.body.style.overflow = drawer.classList.contains('active') ? 'hidden' : 'auto';
        }
    </script>
</body>
</html>
