<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kōpiko Studio | Creative Agency</title>
    <link rel="stylesheet" href="style.css?v=13">
</head>
<body style="background-color: #000 !important;">

    <div id="brand-modal" class="modal-overlay">
        <div class="modal-content">
            <h1 class="modal-title">KŌPIKO</h1>
            <div class="bird-container">
                <img src="b11.webp" alt="Kōpiko Gold Bird" class="gold-bird">
            </div>
            <p class="modal-definition"><em>To meander; to follow a winding path.</em></p>
            <button onclick="closeModal()" class="cta-minimal">Enter Studio</button>
            <p class="modal-disclaimer">Not affiliated with Kopiko Coffee.</p>
        </div>
    </div>

    <div class="site-wrapper">
        
        <nav id="main-nav" class="top-nav" style="display: none;">
            <div class="nav-links left">
                <a href="index.html" class="nav-item active">Home</a>
            </div>
            <div class="logo">KŌPIKO</div>
            <div class="nav-links right">
                <a href="about.html" class="nav-item">About Us</a>
                <a href="commercial.html" class="nav-item">Commercial</a>
                <a href="weddings.html" class="nav-item">Weddings</a>
                <a href="mailto:nazarethoconnor@kopikostudio.com" class="nav-item">Contact</a>
            </div>
        </nav>

        <main class="content-container">
            <section class="hero-split">
                <div class="hero-image-box">
                    <img src="hme.jpg" alt="Hero Featured Work">
                </div>
                <div class="hero-text-box">
                    <h1>Creative identity <br> for the bold</h1>
                </div>
            </section>

            <section class="portfolio-grid">
                <a href="weddings.html" class="card">
                    <img src="wedding-thumb.jpg" alt="Weddings">
                    <span>Plus Weddings</span>
                </a>
                <a href="commercial.html" class="card">
                    <img src="commercial-thumb.jpg" alt="Commercial">
                    <span>Plus Commercial</span>
                </a>
                <a href="about.html" class="card">
                    <img src="about-thumb.jpg" alt="About">
                    <span>Plus About Us</span>
                </a>
            </section>
        </main>

    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            const nav = document.getElementById('main-nav');
            modal.style.opacity = '0';
            modal.style.pointerEvents = 'none';
            setTimeout(() => {
                modal.style.display = 'flex';
                modal.remove(); // Removes splash from code after use
            }, 800);
        }
    </script>
</body>
</html>
