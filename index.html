<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kōpiko Studio | Creative Agency</title>
    <link rel="stylesheet" href="style.css?v=116">
</head>
<body>

    <div id="brand-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content">
            <h1 class="modal-title">KŌPIKO</h1>
            <div class="bird-container">
                <img src="b11.webp" alt="Kōpiko Gold Bird" class="gold-bird">
            </div>
            <p class="modal-definition"><em>To meander; to follow a winding path.</em></p>
            <button class="cta-minimal">Enter Studio</button>
        </div>
    </div>

    <div class="main-layout">
        <aside class="noir-frame"></aside>

        <main class="center-col">
            <nav class="top-nav">
                <div class="nav-group left">
                    <a href="index.html">home</a>
                    <a href="about.html">about</a>
                </div>
                <div class="logo">Kōpiko</div>
                <div class="nav-group right">
                    <a href="weddings.html">weddings</a>
                    <a href="commercial.html">commercial</a>
                </div>
            </nav>

            <section class="hero-split">
                <div class="hero-box left-image">
                    <img src="hme.jpg" alt="Hero Image" class="hero-img-fill">
                </div>
                
                <div class="hero-box right-identity">
                    <div class="identity-stack">
                        <img src="b11.webp" alt="Floating Bird" class="hero-bird-xl">
                        <h2 class="identity-text">creative identity <br> for the bold</h2>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <div class="grid-card">
                    <div class="card-img-placeholder">
                        <img src="wedding-thumb.jpg" alt="Weddings">
                    </div>
                    <p>weddings</p>
                </div>
                <div class="grid-card">
                    <div class="card-img-placeholder">
                        <img src="commercial-thumb.jpg" alt="Commercial">
                    </div>
                    <p>commercial</p>
                </div>
                <div class="grid-card">
                    <div class="card-img-placeholder">
                        <img src="about-thumb.jpg" alt="About">
                    </div>
                    <p>about</p>
                </div>
            </section>
        </main>

        <aside class="noir-frame"></aside>
    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            if (modal) {
                modal.style.opacity = '0';
                modal.style.pointerEvents = 'none';
                setTimeout(() => { 
                    modal.style.display = 'none'; 
                    document.body.style.overflow = 'auto';
                }, 800);
            }
        }
    </script>
</body>
</html>
