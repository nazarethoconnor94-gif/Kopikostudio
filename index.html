<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kōpiko Studio | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; }

        .main-layout { display: grid; grid-template-columns: 80px 1fr 80px; min-height: 100vh; }
        .center-col { padding: 0 40px; display: flex; flex-direction: column; }

        /* --- 2. SPLASH PAGE (THE MODAL) --- */
        #brand-modal { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
            text-align: center; 
            transition: opacity 0.8s ease, visibility 0.8s; 
            cursor: default;
        }
        .modal-content { max-width: 600px; }
        .modal-title { font-size: 3.5rem; letter-spacing: 18px; font-weight: 100; margin-bottom: 20px; text-transform: uppercase; }
        .gold-bird { width: 220px; margin-bottom: 30px; animation: floating 5s infinite ease-in-out; }
        .modal-definition { font-size: 0.9rem; letter-spacing: 2px; color: #888; margin-bottom: 40px; }
        .cta-enter { 
            background: transparent; 
            color: #fff; 
            border: 1px solid #555; 
            padding: 15px 40px; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .cta-enter:hover { background: #fff; color: #000; border-color: #fff; }

        /* --- 3. NAV BAR --- */
        .top-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid rgba(255,255,255,0.2); 
            margin-top: 25px; 
            padding: 12px 25px; 
            background: rgba(30, 30, 30, 0.75); 
            backdrop-filter: blur(12px);
        }
        .nav-group { flex: 1; display: flex; gap: 25px; }
        .nav-group.right { justify-content: flex-end; }
        .nav-group a { color: #fff; text-decoration: none; font-size: 0.75rem; text-transform: lowercase; letter-spacing: 1px; }
        .logo { font-size: 1.4rem; text-transform: capitalize; letter-spacing: 2px; }

        /* --- 4. HERO SECTION --- */
        .hero-split { 
            display: grid; 
            grid-template-columns: 2.2fr 1fr; 
            width: 100%; 
            margin-top: 15px; 
            gap: 15px; 
        }
        .hero-box { 
            border: 1px solid #fff; 
            min-height: 550px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            background-color: #000;
            position: relative;
        }
        .hero-img-fill { width: 100%; height: 100%; object-fit: cover; display: block; }
        .bird-double { width: 80% !important; max-width: 450px; height: auto; animation: floating 6s infinite ease-in-out; }

        /* --- 5. TAGLINE PLACEMENT --- */
        .tag-left-box {
            position: absolute;
            bottom: 30px;
            right: 30px; 
            font-size: clamp(1rem, 1.8vw, 1.6rem);
            font-weight: 200;
            text-transform: lowercase;
            letter-spacing: 4px;
        }
        .tag-right-box {
            position: absolute;
            bottom: 30px;
            left: 30px; 
            font-size: clamp(1rem, 1.8vw, 1.6rem);
            font-weight: 200;
            text-transform: lowercase;
            letter-spacing: 4px;
            white-space: nowrap;
        }

        /* --- 6. BOTTOM GRID --- */
        .bottom-grid { display: flex; gap: 15px; margin-top: 15px; padding-bottom: 40px; }
        .grid-card { flex: 1; border: 1px solid #fff; padding: 15px; text-align: center; }
        .card-img-placeholder { width: 100%; aspect-ratio: 1 / 1; margin-bottom: 12px; background: #111; overflow: hidden; }
        .card-img-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 1fr; }
            .hero-split { grid-template-columns: 1fr; }
            .tag-left-box, .tag-right-box { position: relative; bottom: 0; left: 0; right: 0; padding: 10px; text-align: center; }
            .bottom-grid { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="brand-modal">
        <div class="modal-content">
            <h1 class="modal-title">KŌPIKO</h1>
            <img src="b11.webp" alt="Gold Bird" class="gold-bird">
            <p class="modal-definition"><em>To meander; to follow a winding path.</em></p>
            <button class="cta-enter" onclick="closeModal()">Enter Studio</button>
        </div>
    </div>

    <div class="main-layout">
        <aside style="background:#000;"></aside>

        <main class="center-col">
            <nav class="top-nav">
                <div class="nav-group left">
                    <a href="index.html">home</a>
                    <a href="weddings.html">weddings</a>
                </div>
                <div class="logo">Kōpiko</div>
                <div class="nav-group right">
                    <a href="commercial.html">commercial</a>
                    <a href="about.html">about us</a>
                </div>
            </nav>

            <section class="hero-split">
                <div class="hero-box">
                    <img src="hme.jpg" alt="Hero Image" class="hero-img-fill">
                    <span class="tag-left-box">creative identity</span>
                </div>
                
                <div class="hero-box">
                    <img src="b11.webp" alt="Bird" class="bird-double">
                    <span class="tag-right-box">for the bold</span>
                </div>
            </section>

            <section class="bottom-grid">
                <div class="grid-card"><div class="card-img-placeholder"><img src="wedding-thumb.jpg"></div><p>weddings</p></div>
                <div class="grid-card"><div class="card-img-placeholder"><img src="commercial-thumb.jpg"></div><p>commercial</p></div>
                <div class="grid-card"><div class="card-img-placeholder"><img src="about-thumb.jpg"></div><p>about us</p></div>
            </section>
        </main>

        <aside style="background:#000;"></aside>
    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            if (modal) {
                modal.style.opacity = '0';
                setTimeout(() => { 
                    modal.style.display = 'none'; 
                    document.body.style.overflow = 'auto'; // Re-enable scrolling
                }, 800);
            }
        }
    </script>
</body>
</html>
