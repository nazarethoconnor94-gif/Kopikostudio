<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO COLLECTIONS | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
        }

        body.modal-open { overflow: hidden; }

        /* --- 2. SPLASH PAGE (STUDIO ALIGNMENT) --- */
        #brand-modal { 
            position: fixed; inset: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; text-align: center; 
            transition: opacity 0.8s ease, visibility 0.8s; 
        }

        .modal-content { display: flex; flex-direction: column; align-items: center; }

        .title-block {
            position: relative;
            display: inline-block;
            margin-bottom: 60px;
        }

        .modal-title { 
            font-size: 5rem; 
            letter-spacing: 20px; 
            font-weight: 200; 
            text-transform: uppercase;
            line-height: 1;
            /* Corrects the visual center due to letter-spacing */
            margin-right: -20px; 
        }

        /* STUDIO: Aligned from 2nd letter (O) to 5th letter (K) */
        .studio-subtitle {
            position: absolute;
            left: 16.6%; /* Starts at the 2nd letter */
            right: 16.6%; /* Ends at the 5th letter */
            top: 100%;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 300;
            text-transform: uppercase;
            color: #888;
        }

        .gold-bird { width: 160px; margin-bottom: 40px; animation: floating 5s infinite ease-in-out; }
        
        .cta-enter { 
            background: transparent; color: #fff; border: 1px solid #fff; 
            padding: 16px 50px; letter-spacing: 5px; text-transform: uppercase; 
            font-size: 0.7rem; cursor: pointer; transition: 0.3s; 
        }
        .cta-enter:hover { background: #fff; color: #000; }

        /* --- 3. NAV --- */
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 40px; background: rgba(10, 10, 10, 0.9); 
        }
        .logo { font-size: 1rem; text-transform: uppercase; letter-spacing: 6px; }

        /* --- 4. HERO SECTION (REVERTED TO BORDER-IMAGE) --- */
        .hero-container { 
            position: relative; 
            width: 100%; 
            max-width: 1400px; /* Keeps it sharp on big screens */
            margin: 40px auto;
            padding: 0 40px;
        }

        .hero-img-main { 
            width: 100%; height: auto; display: block; 
            
            /* Physical frame logic */
            border: 55px solid transparent; 
            border-image-source: url('border.png'); 
            border-image-slice: 500 fill; 
            border-image-repeat: round;
            
            /* Lighting */
            box-shadow: 
                inset 0 0 60px rgba(0,0,0,0.9), 
                0 40px 100px rgba(0,0,0,0.8);
        }

        .hero-branding {
            position: absolute; 
            z-index: 10; 
            right: 12%; 
            top: 50%;
            transform: translateY(-50%); 
            text-align: center; 
            pointer-events: none;
        }
        
        .bird-v2 { 
            width: 280px; 
            animation: floating 6s infinite ease-in-out; 
            filter: drop-shadow(0 20px 40px #000); 
        }

        .tag-text { letter-spacing: 10px; font-size: 1.1rem; text-shadow: 2px 2px 15px #000; }

        /* --- 5. GRID --- */
        .bottom-grid { display: flex; gap: 30px; padding: 60px 40px; }
        .grid-card { flex: 1; text-align: center; text-decoration: none; color: inherit; }
        .card-img { width: 100%; aspect-ratio: 4/5; background: #111; overflow: hidden; margin-bottom: 15px; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .grid-card:hover img { transform: scale(1.05); }
        .grid-card p { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.6; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        @media (max-width: 1000px) {
            .modal-title { font-size: 2.5rem; letter-spacing: 10px; margin-right: -10px; }
            .studio-subtitle { left: 16%; right: 16%; font-size: 0.5rem; }
            .hero-container { padding: 0; }
            .hero-img-main { border-width: 30px; }
            .hero-branding { position: relative; right: 0; transform: none; padding: 40px; background: #000; width: 100%; }
            .bottom-grid { flex-direction: column; }
        }
    </style>
</head>
<body class="modal-open">

    <div id="brand-modal">
        <div class="modal-content">
            <div class="title-block">
                <h1 class="modal-title">KŌPIKO</h1>
                <div class="studio-subtitle">
                    <span>S</span><span>T</span><span>U</span><span>D</span><span>I</span><span>O</span>
                </div>
            </div>
            
            <img src="b11.webp" alt="Bird" class="gold-bird">
            
            <button class="cta-enter" onclick="closeModal()">Enter Studio</button>
        </div>
    </div>

    <main>
        <nav class="top-nav">
            <div class="logo">KŌPIKO</div>
        </nav>

        <section class="hero-container">
            <img src="hme.jpg" alt="Art" class="hero-img-main">
            
            <div class="hero-branding">
                <img src="b11.webp" alt="Bird" class="bird-v2">
                <div style="margin-top: 25px;">
                    <p class="tag-text" style="font-weight: 700;">CREATIVE IDENTITY</p>
                    <div style="width: 1px; height: 60px; background: #fff; margin: 18px auto;"></div>
                    <p class="tag-text" style="font-weight: 100;">FOR THE BOLD</p>
                </div>
            </div>
        </section>

        <section class="bottom-grid">
            <a href="#" class="grid-card"><div class="card-img"><img src="weddings.jpg"></div><p>weddings</p></a>
            <a href="#" class="grid-card"><div class="card-img"><img src="commercial.jpg"></div><p>commercial</p></a>
            <a href="#" class="grid-card"><div class="card-img"><img src="aboutus.jpg"></div><p>about us</p></a>
        </section>
    </main>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            modal.style.opacity = '0';
            setTimeout(() => { 
                modal.style.visibility = 'hidden'; 
                document.body.classList.remove('modal-open');
            }, 800);
        }
    </script>
</body>
</html>
