<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO COLLECTIONS | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
            overflow-y: hidden; 
            height: 100%;
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 80px 1fr 80px; 
            min-height: 100vh; 
        }

        .center-col { 
            grid-column: 2; 
            padding: 0 40px; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- 2. SPLASH PAGE --- */
        #brand-modal { 
            position: fixed; inset: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; text-align: center; 
            transition: opacity 0.8s ease, visibility 0.8s; 
        }
        .modal-title { font-size: 3.5rem; letter-spacing: 18px; font-weight: 200; margin-bottom: 20px; text-transform: uppercase; }
        .gold-bird { width: 220px; margin-bottom: 30px; animation: floating 5s infinite ease-in-out; }
        .modal-definition { font-size: 0.9rem; letter-spacing: 2px; color: #888; margin-bottom: 40px; font-style: italic; }
        .cta-enter { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 40px; letter-spacing: 5px; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; }

        /* --- 3. STICKY NAV + MOBILE MENU --- */
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; width: 100%; padding: 12px 30px; 
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(45px); 
            -webkit-backdrop-filter: blur(45px); z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .menu-icon {
            display: none;
            flex-direction: column;
            justify-content: space-around;
            width: 24px; height: 18px;
            cursor: pointer;
            z-index: 102;
        }
        .menu-icon span { width: 100%; height: 2px; background: #fff; }

        .mobile-drawer {
            position: fixed; top: -100%; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.98);
            padding: 80px 40px 40px 40px;
            display: flex; flex-direction: column; gap: 25px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 101;
        }
        .mobile-drawer.active { top: 0; }
        .mobile-drawer a { color: #fff; text-decoration: none; font-size: 1.2rem; text-transform: lowercase; letter-spacing: 4px; }

        .nav-group { display: flex; gap: 30px; }
        .nav-group a { color: #fff; text-decoration: none; font-size: 0.65rem; text-transform: lowercase; letter-spacing: 2px; opacity: 0.8; }
        .logo { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 6px; font-weight: 500; }

        /* --- 4. HERO SECTION (DESKTOP) --- */
        .hero-container {
            width: 100%;
            height: auto; 
            position: relative;
            line-height: 0; 
        }

        .hero-img-main {
            width: 100%;
            height: auto; 
            display: block;
        }

        .hero-branding-overlay {
            position: absolute;
            top: 0; right: 0; 
            width: 50%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2; padding-right: 40px;
        }

        .bird-v2 { 
            width: 380px; height: auto;
            animation: floating 6s infinite ease-in-out; 
            margin-bottom: 35px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* --- 5. THE BRANDING STACK --- */
        .tagline-stack { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .tag-text { 
            font-size: 1.25rem; text-transform: uppercase; letter-spacing: 9px; color: #fff;
            text-shadow: 2px 2px 5px rgba(0,0,0,1), 0 0 25px rgba(0,0,0,0.9); 
        }
        .tag-heavy { font-weight: 700; } 
        .tag-thin { font-weight: 100; }  
        .tag-vertical-line { width: 1.5px; height: 60px; background-color: #fff; box-shadow: 2px 2px 5px rgba(0,0,0,1); }

        /* --- 6. BOTTOM GRID --- */
        .bottom-grid { display: flex; gap: 15px; margin-top: 40px; padding-bottom: 150px; }
        .grid-card { flex: 1; text-align: center; }
        .card-img-placeholder { width: 100%; aspect-ratio: 1 / 1; margin-bottom: 12px; background: #111; overflow: hidden; }
        .card-img-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .grid-card p { font-size: 0.65rem; letter-spacing: 2px; text-transform: lowercase; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- PHONE OPTIMIZATION (EDGE-TO-EDGE) --- */
        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 0 1fr 0; }
            .center-col { padding: 0; } /* Remove all side padding to let photo hit edges */
            .top-nav { padding: 12px 20px; }
            
            .nav-group { display: none; }
            .menu-icon { display: flex; margin-left: 0; }

            .hero-container {
                display: flex;
                flex-direction: column;
                width: 100vw; /* Force full viewport width */
            }

            .hero-img-main { 
                width: 100vw; /* Ensures photo hits both edges of phone */
                height: auto; /* No cropping */
            }

            .hero-branding-overlay {
                position: relative; 
                width: 100%;
                background-color: #000;
                padding: 50px 20px; /* Branding still needs padding so text isn't against edge */
                justify-content: center;
            }

            .bird-v2 { width: 220px; margin-bottom: 20px; }
            .tag-text { font-size: 1rem; letter-spacing: 6px; text-shadow: none; }
            .tag-vertical-line { height: 35px; box-shadow: none; }

            .bottom-grid { 
                padding: 0 20px; /* Re-add padding for thumbnails so they aren't edge-to-edge */
                flex-direction: column; 
                gap: 40px;
            }
        }
    </style>
</head>
<body>

    <div id="brand-modal">
        <div class="modal-content">
            <h1 class="modal-title">KŌPIKO</h1>
            <img src="b11.webp" alt="Gold Bird" class="gold-bird">
            <p class="modal-definition">To meander; to follow a winding path.</p>
            <button class="cta-enter" onclick="closeModal()">Enter Studio</button>
        </div>
    </div>

    <div class="mobile-drawer" id="mobileDrawer">
        <a href="index.html" onclick="toggleMenu()">home</a>
        <a href="weddings.html" onclick="toggleMenu()">weddings</a>
        <a href="commercial.html" onclick="toggleMenu()">commercial</a>
        <a href="about.html" onclick="toggleMenu()">about us</a>
    </div>

    <div class="main-layout">
        <aside></aside>
        
        <main class="center-col">
            <nav class="top-nav">
                <div class="menu-icon" onclick="toggleMenu()">
                    <span></span><span></span><span></span>
                </div>
                <div class="nav-group">
                    <a href="index.html">home</a>
                    <a href="weddings.html">weddings</a>
                    <a href="commercial.html">commercial</a>
                    <a href="about.html">about us</a>
                </div>
                <div class="logo">KŌPIKO</div>
            </nav>

            <section class="hero-container">
                <img src="hme.jpg" alt="Hero" class="hero-img-main">
                <div class="hero-branding-overlay">
                    <img src="b11.webp" alt="Bird" class="bird-v2">
                    <div class="tagline-stack">
                        <span class="tag-text tag-heavy">CREATIVE IDENTITY</span>
                        <div class="tag-vertical-line"></div>
                        <span class="tag-text tag-thin">FOR THE BOLD</span>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <div class="grid-card"><div class="card-img-placeholder"><img src="wedding-thumb.jpg"></div><p>weddings</p></div>
                <div class="grid-card"><div class="card-img-placeholder"><img src="commercial-thumb.jpg"></div><p>commercial</p></div>
                <div class="grid-card"><div class="card-img-placeholder"><img src="about-thumb.jpg"></div><p>about us</p></div>
            </section>
        </main>

        <aside></aside>
    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            modal.style.opacity = '0';
            modal.style.visibility = 'hidden';
            document.body.style.overflowY = 'auto';
            document.documentElement.style.overflowY = 'auto';
        }

        function toggleMenu() {
            const drawer = document.getElementById('mobileDrawer');
            drawer.classList.toggle('active');
        }
    </script>
</body>
</html>
