<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kōpiko Studio | Creative Agency</title>
    <style>
        /* --- CORE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background-color: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }

        .main-layout { display: grid; grid-template-columns: 80px 1fr 80px; min-height: 100vh; }
        .center-col { padding: 0 40px; display: flex; flex-direction: column; }

        /* --- NAV BAR (DARKISH TRANSPARENT GREY) --- */
        .top-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid rgba(255,255,255,0.2); 
            margin-top: 25px; 
            padding: 12px 25px; 
            background: rgba(30, 30, 30, 0.75); 
            backdrop-filter: blur(12px);
            z-index: 100;
        }
        .nav-group { flex: 1; display: flex; gap: 25px; }
        .nav-group.right { justify-content: flex-end; }
        .nav-group a { color: #fff; text-decoration: none; font-size: 0.75rem; text-transform: lowercase; letter-spacing: 1px; }
        .logo { font-size: 1.4rem; text-transform: capitalize; letter-spacing: 2px; }

        /* --- HERO SECTION --- */
        .hero-split { 
            display: grid; 
            grid-template-columns: 2.2fr 1fr; 
            width: 100%; 
            margin-top: 15px; 
            gap: 15px; 
        }

        .hero-box { 
            border: 1px solid #fff; 
            min-height: 550px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            background-color: #000;
            position: relative; /* Essential for tagline placement */
        }

        .hero-img-fill { width: 100%; height: 100%; object-fit: cover; display: block; }

        .bird-double { 
            width: 80% !important; 
            max-width: 450px;
            height: auto; 
            animation: floating 6s infinite ease-in-out; 
        }

        /* --- THE TAGLINE PLACEMENT --- */
        .tag-left-box {
            position: absolute;
            bottom: 30px;
            right: 30px; /* Pinned to the RIGHT of the image box */
            font-size: clamp(1rem, 1.8vw, 1.6rem);
            font-weight: 200;
            text-transform: lowercase;
            letter-spacing: 4px;
        }

        .tag-right-box {
            position: absolute;
            bottom: 30px;
            left: 30px; /* Pinned to the LEFT of the bird box */
            font-size: clamp(1rem, 1.8vw, 1.6rem);
            font-weight: 200;
            text-transform: lowercase;
            letter-spacing: 4px;
            white-space: nowrap;
        }

        /* --- BOTTOM GRID --- */
        .bottom-grid { display: flex; gap: 15px; margin-top: 15px; padding-bottom: 40px; }
        .grid-card { flex: 1; border: 1px solid #fff; padding: 15px; text-align: center; }
        .card-img-placeholder { width: 100%; aspect-ratio: 1 / 1; margin-bottom: 12px; background: #111; overflow: hidden; }
        .card-img-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        /* --- SPLASH --- */
        .modal-overlay { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; text-align: center; transition: 0.8s; cursor: pointer; }
        .gold-bird { width: 250px; margin-bottom: 25px; animation: floating 5s infinite ease-in-out; }
