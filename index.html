<style>
    /* --- UPDATED SPLASH PAGE --- */
    #brand-modal { 
        position: fixed; inset: 0; background: #000; 
        display: flex; justify-content: center; align-items: center; 
        z-index: 9999; text-align: center; 
        transition: opacity 0.8s ease, visibility 0.8s; 
    }

    .modal-content { 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
    }

    /* Main Title Container */
    .title-wrap {
        position: relative;
        display: inline-block;
        margin-bottom: 40px;
    }

    .modal-title { 
        font-size: 4.5rem; 
        letter-spacing: 18px; 
        font-weight: 200; 
        text-transform: uppercase;
        line-height: 1;
        /* Removing right margin from the last letter's spacing for perfect centering */
        margin-right: -18px; 
    }

    /* Studio Subtitle: Aligned to the O and K */
    .modal-subtitle {
        display: flex;
        justify-content: space-between;
        width: 100%;
        margin-top: 10px;
        font-size: 0.8rem;
        font-weight: 300;
        letter-spacing: 0; /* Letter spacing is handled by justify-content */
        text-transform: uppercase;
        color: #888;
    }

    .gold-bird { 
        width: 180px; 
        margin-bottom: 35px; 
        animation: floating 5s infinite ease-in-out; 
    }

    .cta-enter { 
        background: transparent; 
        color: #fff; 
        border: 1px solid #fff; 
        padding: 15px 45px; 
        letter-spacing: 5px; 
        text-transform: uppercase; 
        font-size: 0.7rem; 
        cursor: pointer; 
        transition: 0.3s; 
    }
    .cta-enter:hover { background: #fff; color: #000; }
</style>

<div id="brand-modal">
    <div class="modal-content">
        <div class="title-wrap">
            <h1 class="modal-title">KŌPIKO</h1>
            <div class="modal-subtitle">
                <span>S</span><span>T</span><span>U</span><span>D</span><span>I</span><span>O</span>
            </div>
        </div>
        
        <img src="b11.webp" alt="Bird" class="gold-bird">
        
        <button class="cta-enter" onclick="closeModal()">Enter Studio</button>
    </div>
</div>
