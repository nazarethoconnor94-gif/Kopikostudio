<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO COLLECTIONS | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
        }

        body.modal-open { overflow: hidden; }

        /* --- 2. SPLASH PAGE (THE FIX) --- */
        #brand-modal { 
            position: fixed; inset: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; text-align: center; 
            transition: opacity 0.8s ease, visibility 0.8s; 
        }

        .modal-content { display: flex; flex-direction: column; align-items: center; }

        /* Title Container */
        .title-block {
            position: relative;
            display: inline-block;
            margin-bottom: 60px;
        }

        .modal-title { 
            font-size: 5rem; 
            letter-spacing: 20px; 
            font-weight: 200; 
            text-transform: uppercase;
            line-height: 1;
            display: flex;
            justify-content: center;
        }

        /* Target the specific letters for alignment */
        .modal-title span { position: relative; display: inline-block; }

        .studio-subtitle {
            position: absolute;
            /* This targets the space between the 2nd letter (O) and 5th letter (K) */
            left: calc(100% / 6 * 1 + 10px); 
            right: calc(100% / 6 * 1 + 10px);
            top: 100%;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 300;
            text-transform: uppercase;
            color: #aaa;
            letter-spacing: 2px;
        }

        .gold-bird { width: 160px; margin-bottom: 40px; animation: floating 5s infinite ease-in-out; }
        
        .cta-enter { 
            background: transparent; color: #fff; border: 1px solid #fff; 
            padding: 16px 50px; letter-spacing: 5px; text-transform: uppercase; 
            font-size: 0.7rem; cursor: pointer; transition: 0.3s; 
        }
        .cta-enter:hover { background: #fff; color: #000; }

        /* --- 3. NAV --- */
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 40px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); 
        }
        .logo { font-size: 1rem; text-transform: uppercase; letter-spacing: 6px; }

        /* --- 4. HERO SECTION (4K OVERLAY) --- */
        .hero-container { 
            position: relative; width: 100%; margin-top: 40px;
            display: flex; justify-content: center; align-items: center;
        }

        .frame-wrapper { position: relative; width: 100%; z-index: 5; pointer-events: none; }
        .frame-png { width: 100%; height: auto; display: block; filter: drop-shadow(0 30px 60px #000); }

        .photo-underlay {
            position: absolute;
            top: 11.2%; left: 13.5%; width: 73%; height: 77.5%;
            z-index: 1; overflow: hidden; background: #050505;
        }
        .photo-underlay img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }

        .hero-branding {
            position: absolute; z-index: 10; right: 15%; top: 50%;
            transform: translateY(-50%); text-align: center; pointer-events: none;
        }
        .bird-v2 { width: 300px; animation: floating 6s infinite ease-in-out; filter: drop-shadow(0 20px 40px #000); }

        /* --- 5. GRID --- */
        .bottom-grid { display: flex; gap: 30px; padding: 80px 40px; }
        .grid-card { flex: 1; text-align: center; text-decoration: none; color: inherit; }
        .card-img { width: 100%; aspect-ratio: 4/5; background: #111; overflow: hidden; margin-bottom: 15px; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .grid-card:hover img { transform: scale(1.05); }
        .grid-card p { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.6; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        @media (max-width: 1000px) {
            .modal-title { font-size: 2.5rem; letter-spacing: 8px; }
            .studio-subtitle { font-size: 0.5rem; }
            .hero-container { flex-direction: column; }
            .hero-branding { position: relative; right: 0; transform: none; padding: 40px; background: #000; width: 100%; }
            .bottom-grid { flex-direction: column; }
        }
    </style>
</head>
