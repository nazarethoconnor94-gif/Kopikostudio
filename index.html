<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO STUDIO | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
            overflow-y: auto; 
            height: 100%;
        }

        .main-layout { display: grid; grid-template-columns: 80px 1fr 80px; min-height: 100vh; }
        .center-col { padding: 0 40px; display: flex; flex-direction: column; }

        /* --- 2. SPLASH PAGE --- */
        #brand-modal { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
            text-align: center; 
            transition: opacity 0.5s ease, visibility 0.5s; 
        }
        .modal-title { font-size: 3.5rem; letter-spacing: 18px; font-weight: 200; margin-bottom: 20px; text-transform: uppercase; }
        .gold-bird { width: 220px; margin-bottom: 30px; animation: floating 5s infinite ease-in-out; }
        .modal-definition { font-size: 0.9rem; letter-spacing: 2px; color: #888; margin-bottom: 40px; }
        .cta-enter { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 40px; letter-spacing: 5px; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; }

        /* --- 3. NAV BAR (LESS TRANSPARENT / FROSTED) --- */
        .top-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            
            position: sticky;
            top: 20px; 
            
            width: 100%; 
            margin-top: 25px; 
            padding: 12px 30px; 
            
            /* Reduced transparency: 0.85 opacity makes it much more visible */
            background: rgba(30, 30, 30, 0.85); 
            /* Kept the high blur for the "frosted" texture */
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px);
            
            border-radius: 12px; 
            z-index: 100;
            /* Thin border to catch the light on the edges */
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        .nav-group { display: flex; gap: 35px; }
        .nav-group a { color: #fff; text-decoration: none; font-size: 0.75rem; text-transform: lowercase; letter-spacing: 2px; font-weight: 400; transition: opacity 0.3s; }
        .nav-group a:hover { opacity: 0.6; }
