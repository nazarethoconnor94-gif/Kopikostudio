<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO COLLECTIONS | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
            height: 100%;
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 80px 1fr 80px; 
            min-height: 100vh; 
        }

        .center-col { 
            grid-column: 2; 
            padding: 0 40px; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- 2. SPLASH PAGE (Mobile Adjusted) --- */
        #brand-modal { 
            position: fixed; inset: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; text-align: center; 
            transition: opacity 0.8s ease, visibility 0.8s; 
        }
        .modal-title { font-size: 2.5rem; letter-spacing: 12px; font-weight: 200; margin-bottom: 20px; text-transform: uppercase; }
        .gold-bird { width: 180px; margin-bottom: 30px; animation: floating 5s infinite ease-in-out; }
        .cta-enter { background: transparent; color: #fff; border: 1px solid #fff; padding: 12px 30px; letter-spacing: 4px; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; }

        /* --- 3. STICKY NAV (Mobile Slim) --- */
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; width: 100%; padding: 12px 20px; 
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .nav-group { display: flex; gap: 15px; }
        .nav-group a { color: #fff; text-decoration: none; font-size: 0.6rem; text-transform: lowercase; letter-spacing: 1px; }
        .logo { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 4px; font-weight: 500; }

        /* --- 4. HERO: NO CROP & RIGHT ALIGNED --- */
        .hero-container {
            width: 100%;
            height: auto; 
            position: relative;
            line-height: 0; 
        }

        .hero-img-main {
            width: 100%;
            height: auto; 
            display: block;
        }

        .hero-branding-overlay {
            position: absolute;
            top: 0;
            right: 0; 
            width: 45%; 
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            z-index: 2;
            background: transparent; 
            padding-right: 20px;
        }

        .bird-v2 { 
            width: 380px; 
            height: auto;
            animation: floating 6s infinite ease-in-out; 
            margin-bottom: 30px;
            /* Bird shadow to match text pop */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* --- 5. THE BRANDING STACK (HEAVY SHADOW) --- */
        .tagline-stack { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .tag-text { 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            letter-spacing: 8px; 
            color: #fff;
            text-align: center;
            /* Extra heavy shadow for photo pop */
            text-shadow: 2px 2px 5px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.8); 
        }
        .tag-heavy { font-weight: 700; } 
        .tag-thin { font-weight: 100; }  
        .tag-vertical-line { 
            width: 1.5px; height: 50px; background-color: #fff; 
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        /* --- 6. BOTTOM GRID --- */
        .bottom-grid { display: flex; gap: 15px; margin-top: 30px; padding-bottom: 100px; }
        .grid-card { flex: 1; text-align: center; }
        .card-img-placeholder { width: 100%; aspect-ratio: 1 / 1; margin-bottom: 12px; background: #111; overflow: hidden; }
        .card-img-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .grid-card p { font-size: 0.6rem; letter-spacing: 1.5px; text-transform: lowercase; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- PHONE OPTIMIZATION (THE FIX) --- */
        @media (max-width: 800px) {
            .main-layout { grid-template-columns: 0 1fr 0; } /* Remove side gutters on phone */
            .center-col { padding: 0 15px; }
            
            .hero-container {
                display: flex;
                flex-direction: column;
            }

            .hero-branding-overlay {
                position: absolute; /* Keep it over the photo */
                width: 100%; /* Take full width so it doesn't squash */
                right: 0;
                padding-right: 0; /* Center it */
            }

            .bird-v2 { 
                width: 220px; /* Scale bird down for small screens */
                margin-bottom: 15px;
            }

            .tag-text {
                font-size: 0.9rem; /* Smaller text for phone */
                letter-spacing: 4px;
            }

            .tag-vertical-line { height: 30px; }

            .bottom-grid { 
                flex-direction: column; /* Stack the cards vertically on phone */
                gap: 30px;
            }
        }
    </style>
</head>
<body>

    <div id="brand-modal">
        <div class="modal-content">
            <h1 class="modal-title">KŌPIKO</h1>
            <img src="b11.webp" alt="Gold Bird" class="gold-bird">
            <button class="cta-enter" onclick="closeModal()">Enter Studio</button>
        </div>
    </div>

    <div class="main-layout">
        <aside></aside>
        
        <main class="center-col">
            <nav class="top-nav">
                <div class="nav-group">
                    <a href="index.html">home</a>
                    <a href="weddings.html">weddings</a>
                    <a href="about.html">about</a>
                </div>
                <div class="logo">KŌPIKO</div>
            </nav>

            <section class="hero-container">
                <img src="hme.jpg" alt="Hero" class="hero-img-main">
                
                <div class="hero-branding-overlay">
                    <img src="b11.webp" alt="Bird" class="bird-v2">
                    <div class="tagline-stack">
                        <span class="tag-text tag-heavy">CREATIVE IDENTITY</span>
                        <div class="tag-vertical-line"></div>
                        <span class="tag-text tag-thin">FOR THE BOLD</span>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <div class="grid-card"><div class="card-img-placeholder"><img src="wedding-thumb.jpg"></div><p>weddings</p></div>
                <div class="grid-card"><div class="card-img-placeholder"><img src="commercial-thumb.jpg"></div><p>commercial</p></div>
                <div class="grid-card"><div class="card-img-placeholder"><img src="about-thumb.jpg"></div><p>about us</p></div>
            </section>
        </main>

        <aside></aside>
    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            modal.style.opacity = '0';
            modal.style.visibility = 'hidden';
            document.body.style.overflowY = 'auto';
        }
    </script>
</body>
</html>
