<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO COLLECTIONS | Creative Agency</title>
    <link rel="preload" href="border.png" as="image">
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
            height: 100%;
        }

        /* Prevent scrolling while splash is active */
        body.modal-open { overflow: hidden; }

        .main-layout { display: grid; grid-template-columns: 80px 1fr 80px; min-height: 100vh; }
        .center-col { grid-column: 2; padding: 0 40px; display: flex; flex-direction: column; }

        /* --- 2. SPLASH PAGE (MODAL) --- */
        #brand-modal { 
            position: fixed; inset: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; text-align: center; 
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s; 
        }

        .modal-content { display: flex; flex-direction: column; align-items: center; }

        /* Precise Alignment Container */
        .title-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 50px;
        }

        .modal-title { 
            font-size: 4.5rem; 
            letter-spacing: 18px; 
            font-weight: 200; 
            text-transform: uppercase;
            line-height: 1;
            margin-right: -18px; /* Offsets the letter-spacing on the last letter for true centering */
        }

        .modal-subtitle {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 12px;
            font-size: 0.85rem;
            font-weight: 300;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0; /* Managed by flex spacing */
        }

        .gold-bird { width: 180px; margin-bottom: 40px; animation: floating 5s infinite ease-in-out; }
        
        .cta-enter { 
            background: transparent; color: #fff; border: 1px solid #fff; 
            padding: 15px 45px; letter-spacing: 5px; text-transform: uppercase; 
            font-size: 0.7rem; cursor: pointer; transition: 0.3s; 
        }
        .cta-enter:hover { background: #fff; color: #000; }

        /* --- 3. NAV --- */
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; width: 100%; padding: 20px 30px; 
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); z-index: 1000;
        }
        .logo { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 6px; font-weight: 500; }

        /* --- 4. HERO SECTION: 4K PHYSICAL LAYERING --- */
        .hero-container { 
            width: 100%; 
            position: relative; 
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Frame (PNG) - Top Layer */
        .frame-wrapper {
            position: relative;
            width: 100%;
            z-index: 5; 
            pointer-events: none; 
        }

        .frame-png {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,1));
        }

        /* The Photo (JPG) - Behind the Frame Hole */
        .photo-underlay {
            position: absolute;
            /* Adjust these values to fit your specific PNG transparency hole */
            top: 11%; 
            left: 13.5%; 
            width: 73%; 
            height: 78%;
            z-index: 1; 
            overflow: hidden;
            background: #050505;
        }

        .photo-underlay img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.85) contrast(1.05); /* Gallery lighting vibe */
        }

        /* The Branding Overlay (Bird and Vertical Text) */
        .hero-branding-overlay {
            position: absolute;
            z-index: 10; 
            right: 15%;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            pointer-events: none;
        }
        .bird-v2 { 
            width: 320px; height: auto; 
            animation: floating 6s infinite ease-in-out; 
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8)); 
        }

        .tagline-stack { display: flex; flex-direction: column; align-items: center; margin-top: 25px; }
        .tag-text { font-size: 1.15rem; text-transform: uppercase; letter-spacing: 9px; color: #fff; text-shadow: 2px 2px 15px #000; }
        .tag-vertical-line { width: 1px; height: 60px; background-color: #fff; margin: 18px 0; box-shadow: 0 0 10px #000; }

        /* --- 5. BOTTOM GRID --- */
        .bottom-grid { display: flex; gap: 30px; margin-top: 70px; padding-bottom: 120px; }
        .grid-card { flex: 1; text-align: center; text-decoration: none; color: inherit; }
        .card-img-placeholder { width: 100%; aspect-ratio: 4/5; background: #111; margin-bottom: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .card-img-placeholder img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
        .grid-card:hover img { transform: scale(1.08); filter: brightness(1.1); }
        .grid-card p { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.5; transition: 0.3s; }
        .grid-card:hover p { opacity: 1; letter-spacing: 5px; }

        /* --- ANIMATIONS --- */
        @keyframes floating { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-20px); } 
        }

        /* --- MOBILE --- */
        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 0 1fr 0; }
            .center-col { padding: 0; }
            .modal-title { font-size: 2.8rem; letter-spacing: 10px; margin-right: -10px; }
            .hero-container { margin-top: 15px; flex-direction: column; }
            .photo-underlay { top: 11%; left: 13%; width: 74%; height: 78%; } /* Standard mobile adjustment */
            .hero-branding-overlay { position: relative; right: 0; transform: none; padding: 60px 20px; background: #000; width: 100%; }
            .bird-v2 { width: 220px; }
            .bottom-grid { flex-direction: column; padding: 0 30px; gap: 50px; }
        }
    </style>
</head>
<body class="modal-open">

    <div id="brand-modal">
        <div class="modal-content">
            <div class="title-wrap">
                <h1 class="modal-title">KŌPIKO</h1>
                <div class="modal-subtitle">
                    <span>S</span><span>T</span><span>U</span><span>D</span><span>I</span><span>O</span>
                </div>
            </div>
            
            <img src="b11.webp" alt="Bird" class="gold-bird">
            
            <button class="cta-enter" onclick="closeModal()">Enter Studio</button>
        </div>
    </div>

    <div class="main-layout">
        <aside></aside>
        <main class="center-col">
            <nav class="top-nav">
                <div class="logo">KŌPIKO</div>
                </nav>

            <section class="hero-container">
                <div class="photo-underlay">
                    <img src="hme.jpg" alt="Hero Artwork">
                </div>

                <div class="frame-wrapper">
                    <img src="border.png" alt="4K Frame Overlay" class="frame-png">
                </div>

                <div class="hero-branding-overlay">
                    <img src="b11.webp" alt="Bird" class="bird-v2">
                    <div class="tagline-stack">
                        <span class="tag-text" style="font-weight: 700;">CREATIVE IDENTITY</span>
                        <div class="tag-vertical-line"></div>
                        <span class="tag-text" style="font-weight: 100;">FOR THE BOLD</span>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <a href="/weddings" class="grid-card">
                    <div class="card-img-placeholder"><img src="weddings.jpg" alt="Weddings"></div>
                    <p>weddings</p>
                </a>
                <a href="/commercial" class="grid-card">
                    <div class="card-img-placeholder"><img src="commercial.jpg" alt="Commercial"></div>
                    <p>commercial</p>
                </a>
                <a href="/about" class="grid-card">
                    <div class="card-img-placeholder"><img src="aboutus.jpg" alt="About Us"></div>
                    <p>about us</p>
                </a>
            </section>
        </main>
        <aside></aside>
    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            modal.style.opacity = '0';
            setTimeout(() => { 
                modal.style.visibility = 'hidden'; 
                document.body.classList.remove('modal-open');
            }, 800);
        }
    </script>
</body>
</html>
