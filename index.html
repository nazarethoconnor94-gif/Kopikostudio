<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kōpiko Studio | Creative Agency</title>
    <link rel="stylesheet" href="style.css?v=105">
</head>
<body>

    <div id="brand-modal" class="modal-overlay">
        <div class="modal-content">
            <h1 class="modal-title">KŌPIKO</h1>
            <div class="bird-container">
                <img src="b11.webp" alt="Kōpiko Gold Bird" class="gold-bird">
            </div>
            <p class="modal-definition"><em>To meander; to follow a winding path.</em></p>
            <button onclick="closeModal()" class="cta-minimal">Enter Studio</button>
        </div>
    </div>

    <div class="main-layout">
        <aside class="noir-frame"></aside>

        <main class="center-col">
            <nav class="top-nav">
                <div class="logo">KŌPIKO</div>
                <div class="nav-links">
                    <a href="#">About</a>
                    <a href="#">Commercial</a>
                    <a href="#">Weddings</a>
                    <a href="#">Contact</a>
                </div>
            </nav>

            <section class="hero-section">
                <div class="hero-image-box">
                    <img src="hme.jpg" alt="Featured Work" class="main-img">
                </div>
                
                <div class="hero-text-box">
                    <div class="identity-stack">
                        <!-- BIGGER FLOATING LOGO -->
                        <img src="b11.webp" alt="Bird Icon" class="sketch-bird">
                        <h2>creative identity <br> for the bold</h2>
                    </div>
                </div>
            </section>

            <section class="portfolio-grid">
                <div class="grid-card">
                    <img src="wedding-thumb.jpg" alt="Weddings">
                    <p>+ Weddings</p>
                </div>
                <div class="grid-card">
                    <img src="commercial-thumb.jpg" alt="Commercial">
                    <p>+ Commercial</p>
                </div>
                <div class="grid-card">
                    <img src="about-thumb.jpg" alt="About">
                    <p>+ About us</p>
                </div>
            </section>
        </main>

        <aside class="noir-frame"></aside>
    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            modal.style.opacity = '0';
            modal.style.pointerEvents = 'none';
            setTimeout(() => { modal.style.display = 'none'; document.body.style.overflow = 'auto'; }, 800);
        }
    </script>
</body>
</html>
