<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO COLLECTIONS | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #000000; --accent-gold: #d4af37; }

        body, html { 
            background-color: var(--bg-color); 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
        }

        /* --- 2. STICKY NAVIGATION --- */
        .top-nav-container {
            position: sticky; top: 0; z-index: 1001;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px 0; max-width: 1300px; margin: 0 auto; width: 92%;
        }
        .logo { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 7px; font-weight: 500; }
        .nav-group { display: flex; gap: 25px; }
        .nav-group a { color: #fff; text-decoration: none; font-size: 0.7rem; text-transform: lowercase; letter-spacing: 2px; opacity: 0.6; transition: 0.3s; }
        .nav-group a:hover { opacity: 1; color: var(--accent-gold); }

        /* --- 3. HERO SECTION (DOUBLE-STACKED) --- */
        .main-layout { display: grid; grid-template-columns: 1fr; background: var(--bg-color); }
        .center-col { max-width: 1300px; margin: 0 auto; width: 92%; }

        .hero-container { 
            position: relative; width: 100%; margin-top: 40px; margin-bottom: 80px; 
            display: flex; align-items: center; justify-content: center;
        }

        .hero-img-main { 
            width: 100%; height: auto; display: block; 
            background-color: #000; 
            border: 50px solid transparent; 
            border-image-source: url('border.png'); 
            border-image-slice: 500 fill; 
            border-image-repeat: round;

            /* DOUBLE STACK: 1 Lift + 1 Recess */
            filter: drop-shadow(0 30px 50px rgba(0,0,0,1)); /* The Lift */
            box-shadow: inset 0 0 100px rgba(0,0,0,1);      /* The Recess */
            
            transition: transform 0.6s ease;
        }

        /* DOUBLE STACK BRANDING POP */
        .hero-branding { 
            position: absolute; z-index: 10; right: 8%; text-align: center; pointer-events: none; 
            /* Double-stack: Harsh offset + Soft glow */
            filter: drop-shadow(4px 4px 0px #000) 
                    drop-shadow(0 15px 30px rgba(0,0,0,0.8));
        }
        
        .bird-v2 { width: 230px; animation: floating 6s infinite ease-in-out; }
        
        .hero-branding p { 
            letter-spacing: 12px; font-weight: 700; 
            text-shadow: 2px 2px 4px #000; text-transform: uppercase;
        }

        /* --- 4. BOTTOM GRID --- */
        .bottom-grid { display: flex; gap: 30px; padding-bottom: 100px; }
        .grid-card { flex: 1; text-align: center; text-decoration: none; color: inherit; }
        .card-img-container { 
            width: 100%; margin-bottom: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.9);
        }
        .card-img-container img { width: 100%; height: auto; display: block; transition: 0.4s ease; }
        .grid-card:hover img { transform: scale(1.03); }
        .grid-card p { font-size: 0.6rem; letter-spacing: 4px; opacity: 0.5; text-transform: uppercase; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        @media (max-width: 900px) {
            .nav-group { display: none; } 
            .hero-container { flex-direction: column; }
            .hero-img-main { border-width: 15px; }
            .hero-branding { position: relative; right: auto; margin-top: 30px; }
            .bird-v2 { width: 160px; }
            .bottom-grid { flex-direction: column; gap: 50px; }
        }
    </style>
</head>
<body>

    <div class="top-nav-container">
        <nav class="top-nav">
            <div class="logo">KŌPIKO</div>
            <div class="nav-group">
                <a href="/">home</a>
                <a href="/weddings">weddings</a>
                <a href="/commercial">commercial</a>
                <a href="/about">about us</a>
            </div>
        </nav>
    </div>

    <div class="main-layout">
        <main class="center-col">
            
            <section class="hero-container">
                <img src="hme.jpg" alt="Hero Art" class="hero-img-main">
                <div class="hero-branding">
                    <img src="b11.webp" alt="Bird" class="bird-v2">
                    <div style="margin-top: 20px;">
                        <p>CREATIVE IDENTITY</p>
                        <div style="width: 1px; height: 50px; background: #fff; margin: 15px auto;"></div>
                        <p style="font-weight: 100; letter-spacing: 14px;">FOR THE BOLD</p>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <a href="/weddings" class="grid-card">
                    <div class="card-img-container"><img src="weddings.jpg"></div>
                    <p>weddings</p>
                </a>
                <a href="/commercial" class="grid-card">
                    <div class="card-img-container"><img src="commercial.jpg"></div>
                    <p>commercial</p>
                </a>
                <a href="/about" class="grid-card">
                    <div class="card-img-container"><img src="aboutus.jpg"></div>
                    <p>about us</p>
                </a>
            </section>

        </main>
    </div>

</body>
</html>
