<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO COLLECTIONS | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
            overflow-y: hidden; 
            height: 100%;
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 80px 1fr 80px; 
            min-height: 100vh; 
        }

        .center-col { 
            grid-column: 2; 
            padding: 0 40px; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- 2. SPLASH PAGE --- */
        #brand-modal { 
            position: fixed; inset: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; text-align: center; 
            transition: opacity 0.8s ease, visibility 0.8s; 
        }
        .modal-title { font-size: 3.5rem; letter-spacing: 18px; font-weight: 200; margin-bottom: 20px; text-transform: uppercase; }
        .gold-bird { width: 220px; margin-bottom: 30px; animation: floating 5s infinite ease-in-out; }
        .modal-definition { font-size: 0.9rem; letter-spacing: 2px; color: #888; margin-bottom: 40px; }
        .cta-enter { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 40px; letter-spacing: 5px; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; }

        /* --- 3. STICKY NAV --- */
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; width: 100%; padding: 12px 30px; 
            background: rgba(25, 25, 25, 0.75); backdrop-filter: blur(45px); 
            -webkit-backdrop-filter: blur(45px); z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .nav-group { display: flex; gap: 30px; }
        .nav-group a { color: #fff; text-decoration: none; font-size: 0.65rem; text-transform: lowercase; letter-spacing: 2px; }
        .logo { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 6px; font-weight: 500; }

        /* --- 4. HERO: NO CROP & RIGHT ALIGNED --- */
        .hero-container {
            width: 100%;
            height: auto; /* CRITICAL: Let the image height be natural */
            position: relative;
            line-height: 0; 
        }

        .hero-img-main {
            width: 100%;
            height: auto; /* CRITICAL: Displays the full image, no cropping */
            display: block;
        }

        /* Fully Transparent Branding Overlay on the Right */
        .hero-branding-overlay {
            position: absolute;
            top: 0;
            right: 0; 
            width: 45%; /* Adjusted width to fit the bigger bird comfortably */
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centered vertically on the right side */
            z-index: 2;
            background: transparent; /* No Frost */
            backdrop-filter: none;
            padding-right: 20px;
        }

        .bird-v2 { 
            width: 380px; /* Big bird as requested */
            height: auto;
            animation: floating 6s infinite ease-in-out; 
            margin-bottom: 30px;
        }

        /* --- 5. BRANDING STACK --- */
        .tagline-stack { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .tag-text { 
            font-size: 1.25rem; /* Bigger text as requested */
            text-transform: uppercase; 
            letter-spacing: 8px; 
            color: #fff;
            /* Shadow for readability on top of photos */
            text-shadow: 0 2px 15px rgba(0,0,0,0.9); 
        }
        .tag-heavy { font-weight: 700; } 
        .tag-thin { font-weight: 100; }  
        .tag-vertical-line { width: 1px; height: 50px; background-color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        /* --- 6. BOTTOM GRID --- */
        .bottom-grid { display: flex; gap: 15px; margin-top: 40px; padding-bottom: 150px; }
        .grid-card { flex: 1; text-align: center; }
        .card-img-placeholder { width: 100%; aspect-ratio: 1 / 1; margin-bottom: 12px; background: #111; overflow: hidden; }
        .card-img-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
            .center-col { padding: 0 20px; }
            .hero-branding-overlay { width: 100%; padding-right: 0; position: relative; padding-top: 40px; }
            .bird-v2 { width: 280px; }
        }
    </style>
</head>
<body>

    <div id="brand-modal">
        <div class="modal-content">
            <h1 class="modal-title">KŌPIKO</h1>
            <img src="b11.webp" alt="Gold Bird" class="gold-bird">
            <p class="modal-definition"><em>To meander; to follow a winding path.</em></p>
            <button class="cta-enter" onclick="closeModal()">Enter Studio</button>
        </div>
    </div>

    <div class="main-layout">
        <aside></aside>
        
        <main class="center-col">
            <nav class="top-nav">
                <div class="nav-group">
                    <a href="index.html">home</a>
                    <a href="weddings.html">weddings</a>
                    <a href="commercial.html">commercial</a>
                    <a href="about.html">about us</a>
                </div>
                <div class="logo">KŌPIKO</div>
            </nav>

            <section class="hero-container">
                <img src="hme.jpg" alt="Full Photography" class="hero-img-main">
                
                <div class="hero-branding-overlay">
                    <img src="b11.webp" alt="Gold Bird" class="bird-v2">
                    <div class="tagline-stack">
                        <span class="tag-text tag-heavy">CREATIVE IDENTITY</span>
                        <div class="tag-vertical-line"></div>
                        <span class="tag-text tag-thin">FOR THE BOLD</span>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <div class="grid-card"><div class="card-img-placeholder"><img src="wedding-thumb.jpg"></div><p>weddings</p></div>
                <div class="grid-card"><div class="card-img-placeholder"><img src="commercial-thumb.jpg"></div><p>commercial</p></div>
                <div class="grid-card"><div class="card-img-placeholder"><img src="about-thumb.jpg"></div><p>about us</p></div>
            </section>
        </main>

        <aside></aside>
    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            modal.style.opacity = '0';
            modal.style.visibility = 'hidden';
            document.body.style.overflowY = 'auto';
            document.documentElement.style.overflowY = 'auto';
        }
    </script>
</body>
</html>
