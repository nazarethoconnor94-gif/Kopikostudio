<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO COLLECTIONS | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-color: #000000; --accent-gold: #d4af37; }

        body, html { 
            background-color: var(--bg-color); 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
        }

        /* --- 2. STICKY NAVIGATION --- */
        .top-nav-container {
            position: sticky; 
            top: 0; 
            z-index: 1001;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .top-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 0; 
            max-width: 1300px; 
            margin: 0 auto; 
            width: 90%;
        }
        .logo { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 7px; font-weight: 500; }
        
        .nav-group { display: flex; gap: 30px; }
        .nav-group a { 
            color: #fff; 
            text-decoration: none; 
            font-size: 0.7rem; 
            text-transform: lowercase; 
            letter-spacing: 2px; 
            opacity: 0.6; 
            transition: 0.3s;
        }
        .nav-group a:hover { opacity: 1; color: var(--accent-gold); }

        /* Mobile Hamburger Icon */
        .menu-icon { display: none; flex-direction: column; justify-content: space-between; width: 28px; height: 16px; cursor: pointer; }
        .menu-icon span { width: 100%; height: 1px; background: var(--accent-gold); transition: 0.4s; }

        /* --- 3. HERO SECTION (3D TRIPLE-STACK) --- */
        .main-layout { display: grid; grid-template-columns: 1fr; background: var(--bg-color); }
        .center-col { max-width: 1300px; margin: 0 auto; width: 90%; }

        .hero-container { 
            position: relative; 
            width: 100%; 
            margin-top: 40px; 
            margin-bottom: 80px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .hero-img-main { 
            width: 100%; 
            height: auto; 
            display: block; 
            background-color: #000; /* This makes the inner shadows visible */
            
            /* 4K Border */
            border: 55px solid transparent; 
            border-image-source: url('border.png'); 
            border-image-slice: 500 fill; 
            border-image-repeat: round;

            /* TRIPLE STACK EXTERNAL (The Lift) */
            filter: drop-shadow(0 40px 60px rgba(0,0,0,1)) 
                    drop-shadow(0 15px 25px rgba(0,0,0,0.8));

            /* TRIPLE STACK INTERNAL (The 3D Cavern) */
            box-shadow: 
                inset 0 0 160px rgba(0,0,0,1), 
                inset 0 0 80px rgba(0,0,0,1), 
                inset 0 0 30px rgba(0,0,0,1);
            
            transition: transform 0.6s ease;
        }

        /* HARSH BRANDING POP (Triple-Stack Shadow) */
        .hero-branding { 
            position: absolute; 
            z-index: 10; 
            right: 8%; 
            text-align: center; 
            pointer-events: none; 
            /* Harsh black backing to make elements jump off the photo */
            filter: drop-shadow(5px 5px 0px #000) 
                    drop-shadow(-2px -2px 0px #000) 
                    drop-shadow(0 20px 40px #000);
        }
        
        .bird-v2 { width: 240px; animation: floating 6s infinite ease-in-out; }
        
        .hero-branding p { 
            letter-spacing: 12px; 
            font-weight: 700; 
            text-shadow: 2px 2px 5px #000; 
            text-transform: uppercase;
        }

        /* --- 4. BOTTOM GRID --- */
        .bottom-grid { display: flex; gap: 40px; padding-bottom: 100px; }
        .grid-card { flex: 1; text-align: center; text-decoration: none; color: inherit; }
        .card-img-container { 
            width: 100%; 
            margin-bottom: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,1); /* Heavy grounding for smaller cards */
            transition: 0.5s ease;
        }
        .card-img-container img { width: 100%; height: auto; display: block; transition: 0.5s ease; }
        
        .grid-card:hover img { transform: scale(1.05); filter: brightness(1.1); }
        .grid-card p { font-size: 0.6rem; letter-spacing: 4px; opacity: 0.5; text-transform: uppercase; }

        /* Animations */
        @keyframes floating { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-15px); } 
        }

        /* Mobile Viewport */
        @media (max-width: 900px) {
            .nav-group { display: none; } 
            .menu-icon { display: flex; }
            .hero-container { flex-direction: column; }
            .hero-img-main { border-width: 20px; }
            .hero-branding { position: relative; right: auto; margin-top: 40px; }
            .bird-v2 { width: 180px; }
            .bottom-grid { flex-direction: column; gap: 60px; }
        }
    </style>
</head>
<body>

    <div class="top-nav-container">
        <nav class="top-nav">
            <div class="menu-icon"><span></span><span></span><span></span></div>
            <div class="nav-group">
                <a href="/">home</a>
                <a href="/weddings">weddings</a>
                <a href="/commercial">commercial</a>
                <a href="/about">about us</a>
            </div>
            <div class="logo">KŌPIKO</div>
        </nav>
    </div>

    <div class="main-layout">
        <main class="center-col">
            
            <section class="hero-container">
                <img src="hme.jpg" alt="Hero Art" class="hero-img-main">
                <div class="hero-branding">
                    <img src="b11.webp" alt="Bird" class="bird-v2">
                    <div style="margin-top: 25px;">
                        <p>CREATIVE IDENTITY</p>
                        <div style="width: 1px; height: 60px; background: #fff; margin: 20px auto;"></div>
                        <p style="font-weight: 100; letter-spacing: 15px;">FOR THE BOLD</p>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <a href="/weddings" class="grid-card">
                    <div class="card-img-container"><img src="weddings.jpg"></div>
                    <p>weddings</p>
                </a>
                <a href="/commercial" class="grid-card">
                    <div class="card-img-container"><img src="commercial.jpg"></div>
                    <p>commercial</p>
                </a>
                <a href="/about" class="grid-card">
                    <div class="card-img-container"><img src="aboutus.jpg"></div>
                    <p>about us</p>
                </a>
            </section>

        </main>
    </div>

</body>
</html>
