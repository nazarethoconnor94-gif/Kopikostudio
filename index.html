<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO STUDIO | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
            overflow-y: auto; 
            height: 100%;
        }

        .main-layout { display: grid; grid-template-columns: 80px 1fr 80px; min-height: 100vh; }
        .center-col { padding: 0 40px; display: flex; flex-direction: column; }

        /* --- 2. SPLASH PAGE --- */
        #brand-modal { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
            text-align: center; 
            transition: opacity 0.5s ease, visibility 0.5s; 
        }
        .modal-title { font-size: 3.5rem; letter-spacing: 18px; font-weight: 200; margin-bottom: 20px; text-transform: uppercase; }
        .gold-bird { width: 220px; margin-bottom: 30px; animation: floating 5s infinite ease-in-out; }
        .modal-definition { font-size: 0.9rem; letter-spacing: 2px; color: #888; margin-bottom: 40px; }
        .cta-enter { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 40px; letter-spacing: 5px; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; }

        /* --- 3. NAV BAR (ULTRA SLIM HEADER) --- */
        .top-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky;
            top: 0; 
            width: 100%; 
            padding: 8px 30px; 
            background: rgba(25, 25, 25, 0.75); 
            backdrop-filter: blur(45px); 
            -webkit-backdrop-filter: blur(45px);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
        }
        
        .nav-group { display: flex; gap: 30px; }
        .nav-group a { color: #fff; text-decoration: none; font-size: 0.65rem; text-transform: lowercase; letter-spacing: 2px; font-weight: 400; transition: opacity 0.3s; }
        .nav-group a:hover { opacity: 0.6; }
        .logo { color: #fff; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 6px; font-weight: 500; }

        /* --- 4. UPDATED HERO SECTION (NO-CROP + CENTERED PANE) --- */
        .hero-edge-container {
            width: 100%;
            /* NO CROP: Height is now derived from the background image's aspect ratio */
            height: auto; 
            min-height: 600px; /* Optional min-height context */
            margin-top: 0; /* Flush with header */
            position: relative; /* Setup context for layering */
            overflow: hidden; /* Keep image contained */
            display: flex; /* Flex layout to center the content box */
            align-items: center;
            justify-content: center;
        }

        /* The Image Layer (Behind everything) */
        .hero-img-behind {
            display: block; /* Changes image to block for automatic height calculation */
            width: 100%;
            height: auto; /* Preserve aspect ratio and show full photo width */
            object-fit: contain; /* Maintain ratio, NO cropping */
            z-index: 1; /* Lowest z-index in the container */
        }

        /* The Floating Identity Box (Frosted Glass Layer) */
        .floating-identity-box {
            position: absolute; /* Sits OVER the image while centered */
            z-index: 2; /* Sits above the image */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Locks perfectly center */
            
            /* Box Styling */
            padding: 50px 70px; /* Room for content */
            border-radius: 12px;
            
            /* THE FROST EFFECT (Matches Nav) */
            background: rgba(30, 30, 30, 0.45); /* Lighter base color for contrast */
            backdrop-filter: blur(35px); /* Strong frost over the image */
            -webkit-backdrop-filter: blur(35px);
            
            /* Faint boundary edge */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); /* Subtle depth shadow */
            
            /* Content Layout */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* --- UPDATED: Bird scaled up --- */
        .bird-v2 { 
            width: 380px; /* Increased from 250px */
            height: auto;
            animation: floating 6s infinite ease-in-out; 
            margin-bottom: 25px; /* Space before text */
        }

        /* --- 5. THE BRANDING STACK (Inside Glass) --- */
        .tagline-stack { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        /* --- UPDATED: Text scaled up + CONTRAST SHADOW --- */
        .tag-text { 
            font-size: 1.25rem; /* Increased from 0.85rem */ 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            color: #fff; 
            /* THE FIX: High contrast text shadow so white pops against photo */
            text-shadow: 0 1px 2px rgba(0,0,0,0.6), 0 0 10px rgba(0,0,0,0.3);
        }
        
        /* The specific contrasts you requested */
        .tag-heavy { font-weight: 700; }  /* CREATIVE IDENTITY is bold */
        .tag-thin { font-weight: 100; }    /* FOR THE BOLD is thin */
        
        .tag-vertical-line { width: 1px; height: 35px; background-color: #fff; }

        /* --- 6. BOTTOM GRID (Unchanged) --- */
        .bottom-grid { display: flex; gap: 15px; margin-top: 15px; padding-bottom: 100px; }
        .grid-card { flex: 1; padding: 15px; text-align: center; }
        .card-img-placeholder { width: 100%; aspect-ratio: 1 / 1; margin-bottom: 12px; background: #111; overflow: hidden; }
        .card-img-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .grid-card p { text-transform: lowercase; font-size: 0.65rem; letter-spacing: 2px; font-weight: 300; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* Responsiveness for the new layout */
        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 1fr; }
            .hero-edge-container { height: auto; padding: 40px 0; }
            .hero-img-behind { position: relative; inset: 0; }
            .floating-identity-box { position: absolute; padding: 30px; border-radius: 0; width: 100%; }
            .bird-v2 { width: 300px; }
            .center-col { padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div id="brand-modal">
        <div class="modal-content">
            <h1 class="modal-title">KŌPIKO</h1>
            <img src="b11.webp" alt="Gold Bird" class="gold-bird">
            <p class="modal-definition"><em>To meander; to follow a winding path.</em></p>
            <button class="cta-enter" onclick="closeModal()">Enter Studio</button>
        </div>
    </div>

    <div class="main-layout">
        <aside></aside>
        <main class="center-col">
            <nav class="top-nav">
                <div class="nav-group">
                    <a href="index.html">home</a>
                    <a href="weddings.html">weddings</a>
                    <a href="commercial.html">commercial</a>
                    <a href="about.html">about us</a>
                </div>
                <div class="logo">KŌPIKO</div>
            </nav>

            <section class="hero-edge-container">
                <img src="hme.jpg" alt="Hero Image Background" class="hero-img-behind">

                <div class="floating-identity-box">
                    <img src="b11.webp" alt="Gold Bird Identity" class="bird-v2">
                    
                    <div class="tagline-stack">
                        <span class="tag-text tag-heavy">CREATIVE IDENTITY</span>
                        
                        <div class="tag-vertical-line"></div>
                        
                        <span class="tag-text tag-thin">FOR THE BOLD</span>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <div class="grid-card"><div class="card-img-placeholder"><img src="wedding-thumb.jpg"></div><p>weddings</p></div>
                <div class="grid-card"><div class="card-img-placeholder"><img src="commercial-thumb.jpg"></div><p>commercial</p></div>
                <div class="grid-card"><div class="card-img-placeholder"><img src="about-thumb.jpg"></div><p>about us</p></div>
            </section>
        </main>
        <aside></aside>
    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            modal.style.opacity = '0';
            modal.style.visibility = 'hidden';
            modal.style.pointerEvents = 'none';
            document.body.style.overflowY = 'auto';
            document.documentElement.style.overflowY = 'auto';
        }
    </script>
</body>
</html>
