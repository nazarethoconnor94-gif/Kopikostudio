<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO STUDIO | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
        }

        /* Removed side-border logic from main layout */
        .main-layout { display: grid; grid-template-columns: 80px 1fr 80px; min-height: 100vh; }
        .center-col { padding: 0 40px; display: flex; flex-direction: column; }

        /* --- 2. SPLASH PAGE --- */
        #brand-modal { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
            text-align: center; 
            transition: opacity 0.8s ease; 
        }
        .modal-title { font-size: 3.5rem; letter-spacing: 18px; font-weight: 200; margin-bottom: 20px; text-transform: uppercase; }
        .gold-bird { width: 220px; margin-bottom: 30px; animation: floating 5s infinite ease-in-out; }
        .modal-definition { font-size: 0.9rem; letter-spacing: 2px; color: #888; margin-bottom: 40px; }
        .cta-enter { 
            background: transparent; 
            color: #fff; 
            border: 1px solid #555; 
            padding: 15px 40px; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            cursor: pointer; 
        }

        /* --- 3. NAV BAR --- */
        .top-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            /* Subtle border remains on nav only for structure, or remove by changing to 0px */
            border: 1px solid rgba(255,255,255,0.1); 
            margin-top: 25px; 
            padding: 15px 30px; 
            background: rgba(150, 150, 150, 0.15); 
            backdrop-filter: blur(20px); 
            z-index: 100;
        }
        .nav-group { display: flex; gap: 35px; }
        .nav-group a { color: #fff; text-decoration: none; font-size: 0.75rem; text-transform: lowercase; letter-spacing: 2px; font-weight: 300; transition: opacity 0.3s;}
        .nav-group a:hover { opacity: 0.6; }
        .logo { font-size: 1.4rem; text-transform: uppercase; letter-spacing: 5px; font-weight: 400; }

        /* --- 4. HERO SECTION --- */
        .hero-split { 
            display: grid; 
            grid-template-columns: 2.2fr 1fr; 
            width: 100%; 
            margin-top: 15px; 
            gap: 15px; 
        }
        .hero-box { 
            /* BORDERS REMOVED */
            border: none; 
            min-height: 550px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative;
        }
        .hero-img-fill { width: 100%; height: 100%; object-fit: cover; display: block; }
