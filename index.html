<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kōpiko Studio | Creative Agency</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="brand-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="meander-container">
                <svg viewBox="0 0 800 200" class="meander-line">
                    <path d="M0,100 Q100,20 200,100 T400,100 T600,100 T800,100" />
                </svg>
            </div>
            <h1 class="modal-title">KŌPIKO</h1>
            <p class="modal-definition"><em>(v.) To meander; to follow a winding path.</em></p>
            <button onclick="closeModal()" class="cta-minimal">Enter Studio</button>
            <p class="modal-disclaimer">Not affiliated with Kopiko Coffee.</p>
        </div>
    </div>

    <section class="hero">
        <nav>
            <div class="logo">KŌPIKO</div>
            <div class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="meaning.html">The Meaning</a>
            </div>
        </nav>

        <div class="hero-content">
            <h1>Creative Identity <br> for the Bold.</h1>
            <p>We guide brands through the winding path of digital storytelling.</p>
            <a href="mailto:nazarethoconnor@kopikostudio.com" class="cta">Start a Project</a>
        </div>
    </section>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.style.display = 'none';
            }, 800);
        }

        window.onload = function() {
            if (!sessionStorage.getItem('viewedIntro')) {
                document.getElementById('brand-modal').style.display = 'flex';
                sessionStorage.setItem('viewedIntro', 'true');
            } else {
                document.getElementById('brand-modal').style.display = 'none';
            }
        }
    </script>
</body>
</html>
