<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KŌPIKO STUDIO | Creative Agency</title>
    <style>
        /* --- 1. CORE & RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
            height: 100%;
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 80px 1fr 80px; 
            min-height: 100vh; 
        }

        .center-col { 
            grid-column: 2; 
            padding: 0 40px; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- 2. SPLASH PAGE --- */
        #brand-modal { 
            position: fixed; inset: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; text-align: center; 
            transition: opacity 0.5s ease, visibility 0.5s; 
        }
        .modal-title { font-size: 3.5rem; letter-spacing: 18px; font-weight: 200; margin-bottom: 20px; text-transform: uppercase; }
        .gold-bird { width: 220px; margin-bottom: 30px; animation: floating 5s infinite ease-in-out; }
        .cta-enter { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 40px; letter-spacing: 5px; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; }

        /* --- 3. NAV BAR --- */
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; padding: 20px 0; 
            background: transparent; 
            z-index: 100;
        }
        .nav-group { display: flex; gap: 30px; }
        .nav-group a { color: #fff; text-decoration: none; font-size: 0.65rem; text-transform: lowercase; letter-spacing: 2px; transition: opacity 0.3s; }
        .nav-group a:hover { opacity: 0.6; }
        .logo { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 6px; font-weight: 500; }

        /* --- 4. HERO SECTION (THE "NO-CROP" FIX) --- */
        .hero-container {
            width: 100%;
            position: relative; /* Container height is now dictated by the image inside */
            line-height: 0; /* Removes tiny gap at bottom of image */
        }

        .hero-img-main {
            width: 100%;
            height: auto; /* THIS PREVENTS CROPPING: It shows the whole width and adjusts height automatically */
            display: block;
        }

        /* The Invisible Right-Hand Branding Zone */
        .hero-branding-overlay {
            position: absolute;
            top: 0;
            right: 0;
            width: 40%; /* Space for branding */
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Sits at the top */
            padding-top: 50px; /* Distance from top of the photo */
            z-index: 2;
        }

        .bird-v2 { 
            width: 220px; 
            height: auto;
            animation: floating 6s infinite ease-in-out; 
            margin-bottom: 25px;
        }

        /* --- 5. THE BRANDING STACK --- */
        .tagline-stack { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .tag-text { 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.7); /* High contrast shadow for clarity */
        }
        .tag-heavy { font-weight: 700; } 
        .tag-thin { font-weight: 100; }  
        .tag-vertical-line { 
            width: 1px; height: 35px; background-color: #fff; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* --- 6. BOTTOM GRID --- */
        .bottom-grid { display: flex; gap: 15px; margin-top: 30px; padding-bottom: 100px; }
        .grid-card { flex: 1; text-align: center; }
        .card-img-placeholder { width: 100%; aspect-ratio: 1 / 1; margin-bottom: 12px; background: #111; overflow: hidden; }
        .card-img-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .grid-card p { text-transform: lowercase; font-size: 0.65rem; letter-spacing: 2px; font-weight: 300; }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
            .center-col { padding: 0 20px; }
            .hero-branding-overlay { width: 100%; padding-top: 20px; }
            .bird-v2 { width: 160px; }
        }
    </style>
</head>
<body>

    <div id="brand-modal">
        <div class="modal-content">
            <h1 class="modal-title">KŌPIKO</h1>
            <img src="b11.webp" alt="Gold Bird" class="gold-bird">
            <button class="cta-enter" onclick="closeModal()">Enter Studio</button>
        </div>
    </div>

    <div class="main-layout">
        <aside></aside>
        
        <main class="center-col">
            <nav class="top-nav">
                <div class="nav-group">
                    <a href="index.html">home</a>
                    <a href="weddings.html">weddings</a>
                    <a href="commercial.html">commercial</a>
                    <a href="about.html">about us</a>
                </div>
                <div class="logo">KŌPIKO</div>
            </nav>

            <!-- Hero: The Image shows 100% width, No Cropping -->
            <section class="hero-container">
                <img src="hme.jpg" alt="Whole Image" class="hero-img-main">
                
                <!-- Fully Transparent Right Side Branding -->
                <div class="hero-branding-overlay">
                    <img src="b11.webp" alt="Gold Bird" class="bird-v2">
                    <div class="tagline-stack">
                        <span class="tag-text tag-heavy">CREATIVE IDENTITY</span>
                        <div class="tag-vertical-line"></div>
                        <span class="tag-text tag-thin">FOR THE BOLD</span>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <div class="grid-card"><div class="card-img-placeholder"><img src="wedding-thumb.jpg"></div><p>weddings</p></div>
                <div class="grid-card"><div class="card-img-placeholder"><img src="commercial-thumb.jpg"></div><p>commercial</p></div>
                <div class="grid-card"><div class="card-img-placeholder"><img src="about-thumb.jpg"></div><p>about us</p></div>
            </section>
        </main>

        <aside></aside>
    </div>

    <script>
        function closeModal() {
            const modal = document.getElementById('brand-modal');
            modal.style.opacity = '0';
            modal.style.visibility = 'hidden';
            document.body.style.overflowY = 'auto';
        }
    </script>
</body>
</html>
